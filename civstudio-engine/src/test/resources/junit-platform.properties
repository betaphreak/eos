# Parallel test execution (2026-07-23, the post-default-flip speedup): surviving colonies
# run their full 25 years, so the suite's long pole is a handful of INDEPENDENT full-length
# scenario runs — run test CLASSES concurrently (methods stay same-thread within a class).
# All sim state is per-instance/per-session by design (the Phase-0 de-globalization); scenario runs
# under test write NO output/<seed>/ CSVs (-Dcivstudio.printers.skip=true in surefire), so
# no output-dir serialization is needed. Factor 0.25: each concurrent class holds a LIVE GROWING COLONY in heap (and CanonicalRun retains a finished 25y harness statically), so concurrency is memory-bound before it is CPU-bound on a 16 GB box.
junit.jupiter.execution.parallel.enabled=true
junit.jupiter.execution.parallel.mode.default=same_thread
junit.jupiter.execution.parallel.mode.classes.default=concurrent
junit.jupiter.execution.parallel.config.strategy=dynamic
junit.jupiter.execution.parallel.config.dynamic.factor=0.25
