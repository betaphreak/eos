# Test execution is SEQUENTIAL (2026-07-23): parallel CLASSES were disabled because the server
# @SpringBootTest integration suite shares process-wide state across a run (a cached Spring
# context's SessionHost, session virtual threads, static caches) and corrupts under concurrency /
# fork reuse — a leftover STOPPED timeline, a stale registry count. Each class passes in isolation;
# chained it does not. Restoring sequential execution (+ reuseForks=false in the server module, so
# each server class gets its own JVM) is the "not parallel, not sharing JVMs" state these tests were
# written for. Re-enabling parallelism needs the integration tests made self-isolating first.
junit.jupiter.execution.parallel.enabled=false
