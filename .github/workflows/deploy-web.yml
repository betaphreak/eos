name: Deploy WorldMap to Azure SWA

# The web/ site is a fully prebuilt static folder: data.js AND every baked asset
# (web/assets/*.png + plots.pack, ~20 MB) are committed to git, non-LFS. So this job just
# uploads the folder as-is — no Java engine, no web/build.mjs, no LFS. Regenerate the assets
# locally with `node web/build.mjs` (needs the per-province plot grids, which WorldPlotGenerator
# builds/caches) and commit the result; the deploy ships exactly what is checked in.
# See web/README.md "Deploy".
on:
  push:
    branches: [master]
    paths:
      - 'web/**'                              # any change to the committed site or its baked assets
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

# never let two deploys race; the newest push wins
concurrency:
  group: deploy-web
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # Deploy the prebuilt web/ folder with the Static Web Apps CLI (a plain Node tool) rather than
      # the Azure/static-web-apps-deploy Docker action: no container image to pull, and it runs on any
      # glibc Linux runner. Uploads ./web as-is (no build). The CLI reads the deployment token from
      # SWA_CLI_DEPLOYMENT_TOKEN; --env production targets the live environment (a master push).
      # NPM_CONFIG_LOGLEVEL=error mutes npm's deprecation warnings for the CLI's own transitive deps
      # (inflight/glob/rimraf/… — nothing we can fix here), keeping the deploy log clean.
      - name: Deploy to Azure Static Web Apps
        env:
          SWA_CLI_DEPLOYMENT_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          NPM_CONFIG_LOGLEVEL: error
        run: npx -y @azure/static-web-apps-cli@2 deploy ./web --env production
