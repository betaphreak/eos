name: Deploy WorldMap to Azure SWA

# The web/ site is a prebuilt static folder whose inputs are all gitignored, generated
# artifacts (per-province plot grids, caravan journals, plots.pack). So this job rebuilds
# them from source with the Java engine, runs web/build.mjs, and uploads the result to
# Azure Static Web Apps. See web/README.md "Deploy".
on:
  push:
    branches: [master]
    paths:
      - 'web/**'
      - 'src/**'
      - 'data/anbennar/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

# never let two deploys race; the newest push wins
concurrency:
  group: deploy-web
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (no full LFS pull)
        uses: actions/checkout@v5
        with:
          lfs: false          # UnpackedArt is 141 MB of LFS; we only need a few art subtrees

      - name: Fetch the web-baked art subtrees (scoped LFS)
        # only what the web build bakes: land ground textures (terrain tiles) and the river
        # water texture (river ribbon). Anything not pulled makes its bake fall back
        # gracefully — so keep this in sync with build.mjs.
        run: git lfs pull --include="UnpackedArt/art/terrain/textures/land,UnpackedArt/art/terrain/routes/rivers"

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Cache per-province plot grids
        uses: actions/cache@v5
        with:
          path: src/main/resources/map/provinces
          # the grids are a pure function of the plot generators + the source rasters, so
          # rebuild the cache only when those change; WorldPlotGenerator skips grids already
          # present, so a warm cache makes the generate step a near-instant no-op
          key: plotgrids-${{ hashFiles('src/main/java/com/civstudio/geo/**', 'src/main/java/com/civstudio/settlement/ProvincePlot*.java', 'data/anbennar/heightmap.bmp', 'data/anbennar/terrain.bmp', 'data/anbennar/provinces.bmp', 'data/anbennar/rivers.bmp', 'data/anbennar/trees.bmp') }}

      - name: Generate per-province plot grids (whole world; cached)
        run: mvn -q -B compile exec:exec -Dsim.main=com.civstudio.geo.export.WorldPlotGenerator

      - name: Generate caravan journals (seed 24601)
        run: mvn -q -B -Dtest=ParallelCaravansTest test

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Build web bundle (data.js + assets)
        run: node web/build.mjs

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: web          # upload the prebuilt folder as-is
          skip_app_build: true       # no Oryx build — build.mjs already produced everything
          output_location: ''
