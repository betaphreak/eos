name: CivStudio Server

# Builds the live spectator server image (docs/client-server.md) and pushes it to GitHub Container
# Registry (ghcr.io/<owner>/civstudio-server). It does NOT deploy the Container App: the project
# subscription is accessed by a *guest* identity that can create/manage resources but cannot
# create role assignments, so no CI service principal can be granted ARM rights. Rolling the
# app to a new image is therefore a one-liner run from an authenticated session (see
# docs/client-server.md §Deployment → "Updating"). CI's job is the part that can't be done on
# the dev box: building the image and pushing it.
#
# Auth: the built-in GITHUB_TOKEN (permissions: packages: write) — no stored registry secrets, no
# Azure AD login, no service principal. The pushed package is PUBLIC, so the Container App pulls it
# with no credentials (make it public once, in the repo's Packages settings, after the first push).
on:
  push:
    branches: [master]
    paths:
      - 'civstudio-engine/**'                     # the sim core (source + module pom)
      - 'civstudio-server/**'                     # the Spring Boot server (source + module pom)
      - 'pom.xml'                                 # the reactor parent
      - '.mvn/**'                                 # the Maven wrapper config
      - 'Dockerfile'
      - '.dockerignore'
      - 'web/lobby.html'                          # the lobby page the server serves at /
      - '.github/workflows/deploy-server.yml'
  workflow_dispatch:

concurrency:
  group: build-server-image
  cancel-in-progress: true

permissions:
  contents: read
  packages: write             # push to ghcr.io with the built-in GITHUB_TOKEN

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      # ghcr requires an all-lowercase owner; github.repository_owner (betaphreak) already is
      IMG: ghcr.io/${{ github.repository_owner }}/civstudio-server
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0            # full history so `git rev-list --count HEAD` is the real build number

      - name: Build metadata
        id: meta
        run: |
          # build identity for /actuator/info (the .git is not in the Docker context, so pass it in)
          echo "number=$(git rev-list --count HEAD)" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.IMG }}:${{ github.sha }}
            ${{ env.IMG }}:latest
          build-args: |
            BUILD_NUMBER=${{ steps.meta.outputs.number }}
            BUILD_COMMIT=${{ steps.meta.outputs.commit }}
          # GitHub Actions layer cache — the Maven `dependency:go-offline` layer is restored unless a
          # POM changes, so a source-only change skips re-downloading the whole dependency tree.
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server
          provenance: false

      - name: Next step (manual deploy)
        run: |
          echo "Image pushed: $IMG:${{ github.sha }}"
          echo "Roll the app from an authenticated az session:"
          echo "  az containerapp update -n civstudio-server -g civstudio \\"
          echo "    --image $IMG:${{ github.sha }}"
