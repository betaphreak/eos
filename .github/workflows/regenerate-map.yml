name: Regenerate map

# Regenerates (bakes) the whole-world per-plot map cache (geo/export/WorldPlotGenerator) — real
# terrain, features,
# bonuses AND GeoNames place names — and uploads it to the Azure Files share the live server reads
# (docs/client-server.md §Deployment). This is the step that USED to run on the dev box
# (tools/deploy-plot-cache.ps1). Place names come from the committed GeoNames subset that ships in the
# engine jar (no 372 MB dump needed — any machine, incl. this runner, bakes named plots), but the plot
# cache itself is large + per-province, so a fresh named cache must still be shipped whenever plot
# generation changes (a ProvincePlotStore.MAP_VERSION bump), else prod regenerates plots on demand.
#
# It does NOT roll the Container App: the project subscription is a *guest* identity that can't
# create role assignments (no CI service principal), so the app roll stays a manual
# `az containerapp update` from an authenticated session — same constraint as deploy-server.yml.
# The UPLOAD here needs no login: it uses a storage ACCOUNT KEY (key auth sidesteps the role limit).
#
# ── Required repo config (Settings → Secrets and variables → Actions) ──────────────────────────────
#   secret PLOT_STORAGE_ACCOUNT   the storage account behind the share (e.g. civstudiofiles)
#   secret PLOT_STORAGE_KEY       an account access key for that storage account (upload + prune)
#   var    PLOT_STORAGE_SHARE     (optional) the file share name; defaults to 'anbennar'
#   secret ANBENNAR_TOKEN         (optional) a GitLab PRIVATE-TOKEN for the on-demand Anbennar fetch,
#                                 to dodge rate limits; the map rasters are a small fixed set so it
#                                 usually works token-less. C2C uses the built-in GITHUB_TOKEN.
# Until PLOT_STORAGE_ACCOUNT/KEY exist the upload step fails — the bake still runs, so a
# workflow_dispatch is a safe dry check of the bake itself.

on:
  workflow_dispatch:
    inputs:
      keep_previous:
        description: 'Older cache versions to retain on the share besides v<new> (prune the rest)'
        default: '1'
  push:
    branches: [master]
    # only when plot generation could change — the guard step then confirms MAP_VERSION actually moved
    paths:
      - 'civstudio-engine/src/main/java/com/civstudio/settlement/ProvincePlotStore.java'

concurrency:
  group: regenerate-map
  cancel-in-progress: false   # never cancel an in-flight bake+upload

jobs:
  regenerate:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      # on-demand source fetch the bake performs (a small fixed set of rasters/art, cached per ref):
      #   Anbennar → GitLab (PRIVATE-TOKEN), C2C → GitHub (GITHUB_TOKEN). See docs/anbennar-files.md.
      ANBENNAR_TOKEN: ${{ secrets.ANBENNAR_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # full history: the guard below compares against the commit the branch was at BEFORE this
          # push, which can be any distance back (a push of N commits), not HEAD~1.
          fetch-depth: 0

      - name: Resolve MAP_VERSION (and skip an unchanged push)
        id: guard
        run: |
          store=civstudio-engine/src/main/java/com/civstudio/settlement/ProvincePlotStore.java
          extract() { sed -nE 's/.*MAP_VERSION[[:space:]]*=[[:space:]]*([0-9]+).*/\1/p' | head -1; }
          cur=$(extract < "$store")
          echo "current MAP_VERSION=$cur"
          echo "version=$cur" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "push" ]; then
            # Compare against BEFORE THE PUSH, not HEAD~1. A push carries N commits, and the bump is
            # rarely the last of them: MAP_VERSION 9 landed in 6809c1a and was pushed with three
            # later commits, so HEAD~1 already read 9, the guard compared 9 vs 9 and skipped in 11s.
            # The bake silently did not happen, leaving the v9 image pointed at a cache that was
            # never built — the exact failure this guard exists to avoid. github.event.before is the
            # same baseline the `paths:` filter uses to decide the run, so the two now agree.
            before='${{ github.event.before }}'
            case "$before" in
              ''|0000000000000000000000000000000000000000) before='' ;;   # new branch / force-push: no baseline
            esac
            prev=''
            if [ -n "$before" ] && git cat-file -e "$before^{commit}" 2>/dev/null; then
              prev=$(git show "$before":"$store" 2>/dev/null | extract || true)
            fi
            echo "previous MAP_VERSION=${prev:-<none>} (baseline ${before:-<none>})"
            # Fail OPEN: no resolvable baseline → bake. A redundant 24-minute bake is cheap next to
            # rolling an image at a version whose cache does not exist.
            if [ -n "$prev" ] && [ "$cur" = "$prev" ]; then
              echo "MAP_VERSION unchanged ($cur) — nothing to rebake."
              echo "skip=true" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Set up JDK 25 (Temurin)
        if: steps.guard.outputs.skip != 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      # No GeoNames dump download any more: plot naming reads the committed ~4.5 MB subset
      # (generated/geonames/subset.json.gz, on the engine classpath) via GeoNamesSubset, so the bake
      # names plots without the 372 MB allCountries.zip. Rebuild the subset with GeoNamesSubsetExporter
      # (dev-only, needs the full dump) when the region map or plot grids change; see docs/plot-place-naming.md.

      # cache the on-demand Anbennar (GitLab) + C2C (GitHub) source fetches so repeat runs don't
      # re-pull the map rasters / art. Both are ref-scoped subdirs (.anbennar-cache/<ref>, …), so the
      # key tracks the source-lock refs; a restore-keys fallback is harmless — the engine re-fetches
      # the current ref and any stale subdir just sits unused.
      - name: Cache the Anbennar + C2C source fetches
        if: steps.guard.outputs.skip != 'true'
        uses: actions/cache@v4
        with:
          path: |
            .anbennar-cache
            .civ4-cache
          key: source-fetch-${{ hashFiles('civstudio-engine/src/main/resources/anbennar-source.lock', 'civstudio-engine/src/main/resources/civ4-source.lock') }}
          restore-keys: |
            source-fetch-

      - name: Bake the whole-world plot cache
        if: steps.guard.outputs.skip != 'true'
        run: |
          set -o pipefail   # so a bake failure isn't masked by the tee below
          # WorldPlotGenerator warms .map/v<MAP_VERSION>/ then stamps GeoNames names over it.
          # ubuntu-latest ships Maven pre-installed and setup-java pins JAVA_HOME to JDK 25 + caches
          # ~/.m2, so plain `mvn` is the right tool here (no wrapper / exec-bit dance). Tee the output
          # so the Summary step can lift the region→country naming coverage out of it.
          mvn -B -pl civstudio-engine compile exec:exec \
            -Dsim.main=com.civstudio.geo.export.WorldPlotGenerator 2>&1 | tee /tmp/bake.log

      - name: Sanity-check the bake
        if: steps.guard.outputs.skip != 'true'
        run: |
          ver=${{ steps.guard.outputs.version }}
          dir=.map/v$ver
          count=$(find "$dir" -name '*.json.gz' 2>/dev/null | wc -l)
          echo "baked $count province files into $dir"
          if [ "$count" -lt 4000 ]; then
            echo "::error::only $count province files (< 4000 expected for a full world) — bake looks incomplete"
            exit 1
          fi
          # spot-check: names + urban flag actually made it into the fields
          zcat "$(find "$dir" -name '*.json.gz' | head -1)" | head -c 400; echo

      - name: Upload to the Azure Files share (azcopy, parallel)
        if: steps.guard.outputs.skip != 'true'
        env:
          ACCOUNT: ${{ secrets.PLOT_STORAGE_ACCOUNT }}
          KEY: ${{ secrets.PLOT_STORAGE_KEY }}
          SHARE: ${{ vars.PLOT_STORAGE_SHARE || 'anbennar' }}
        run: |
          ver=${{ steps.guard.outputs.version }}
          if [ -z "$ACCOUNT" ] || [ -z "$KEY" ]; then
            echo "::error::PLOT_STORAGE_ACCOUNT / PLOT_STORAGE_KEY secrets are not set — add them to upload the cache."
            exit 1
          fi
          command -v azcopy >/dev/null || { echo "installing azcopy…"; \
            curl -sSL -o /tmp/azcopy.tgz https://aka.ms/downloadazcopy-v10-linux && \
            tar -xzf /tmp/azcopy.tgz -C /tmp && sudo cp /tmp/azcopy_linux_amd64_*/azcopy /usr/local/bin/azcopy; }
          count=$(find ".map/v$ver" -name '*.json.gz' | wc -l)
          # a short-lived share SAS (read/create/write/list) minted from the account key. azcopy then
          # transfers in PARALLEL over HTTPS (443 — no SMB/port-445 dependency) and prints periodic
          # "% done / N of M" progress, NOT a line per file. The v<ver> versioning is the publish
          # isolation: prod only points at v<ver> once its MAP_VERSION-<ver> image is rolled (manual),
          # which the operator does only after this run is green — so a partial v<ver> is never served.
          expiry=$(date -u -d '+2 hours' '+%Y-%m-%dT%H:%MZ')
          sas=$(az storage share generate-sas -n "$SHARE" --account-name "$ACCOUNT" --account-key "$KEY" \
            --permissions rcwdl --expiry "$expiry" -o tsv)
          echo "uploading $count province files (~37 MB) to $SHARE/map/v$ver via azcopy…"
          azcopy copy ".map/v$ver" \
            "https://$ACCOUNT.file.core.windows.net/$SHARE/map?$sas" \
            --recursive --overwrite=true
          echo "uploaded $count files to map/v$ver"

      - name: Prune old cache versions on the share
        if: steps.guard.outputs.skip != 'true'
        env:
          ACCOUNT: ${{ secrets.PLOT_STORAGE_ACCOUNT }}
          KEY: ${{ secrets.PLOT_STORAGE_KEY }}
          SHARE: ${{ vars.PLOT_STORAGE_SHARE || 'anbennar' }}
          KEEP: ${{ github.event.inputs.keep_previous || '1' }}
        run: |
          ver=${{ steps.guard.outputs.version }}
          oldest=$(( ver - KEEP ))
          echo "keeping v$oldest..v$ver on the share, pruning older…"
          for d in $(az storage directory list --account-name "$ACCOUNT" --account-key "$KEY" \
                       --share-name "$SHARE" --name map --query "[].name" -o tsv 2>/dev/null); do
            n=$(printf '%s' "$d" | sed -nE 's/^v([0-9]+)$/\1/p')
            if [ -n "$n" ] && [ "$n" -lt "$oldest" ]; then
              echo "pruning map/$d"
              az storage file delete-batch --account-name "$ACCOUNT" --account-key "$KEY" \
                --source "$SHARE" --pattern "map/$d/*" --output none || true
              az storage directory delete --account-name "$ACCOUNT" --account-key "$KEY" \
                --share-name "$SHARE" --name "map/$d" 2>/dev/null || true
            fi
          done

      - name: Summary
        if: steps.guard.outputs.skip != 'true'
        run: |
          ver=${{ steps.guard.outputs.version }}
          {
            echo "### Map cache regenerated → v$ver"
            echo ""
            # the global naming line (…named N provinces …: T names — U unique, R reused (P%)…), bolded
            grep -E "named [0-9,]+ provinces across" /tmp/bake.log 2>/dev/null \
              | sed -E 's/^ *(.*)$/**\1**/' || true
            echo ""
            echo "<details><summary>Region → country naming coverage</summary>"
            echo ""
            echo "| Region | Country | Unique | Reused | Reuse % |"
            echo "|:--|:--|--:|--:|--:|"
            # lift each "region <key> → <ISO> : N unique, M reused (P%), K provinces" line into a row
            grep -E "region .+ → .+ :" /tmp/bake.log 2>/dev/null \
              | sed -E 's/^ *region +([^ ]+) +→ +([A-Za-z]+) +: +([0-9,]+) unique, +([0-9,]+) reused \(([0-9]+)%\).*/| \1 | \2 | \3 | \4 | \5% |/' || true
            echo ""
            echo "</details>"
            echo ""
            echo "To serve it, roll the server from an authenticated session (guest identity — manual, see docs/client-server.md):"
            echo '```'
            echo "az containerapp update -n civstudio-server -g civstudio --image civstudio.azurecr.io/civstudio-server:latest"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
