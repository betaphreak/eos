name: CivStudio Studio

# Builds the Strapi 5 CMS image (studio/, the content/admin backend) and pushes it to GitHub
# Container Registry (ghcr.io/<owner>/civstudio-backend). Like deploy-server.yml, it does NOT roll the
# Container App: this repo's Azure subscription is reached by a *guest* identity that cannot create
# role assignments, so no CI service principal exists (there is deliberately no AZURE_CREDENTIALS
# secret here). Rolling civstudio-backend-app to the new image is a one-liner run from an
# authenticated az session (printed at the end of the run). CI's job is the build+push.
#
# Auth: the built-in GITHUB_TOKEN (permissions: packages: write) — no stored registry secrets. The
# pushed package is PUBLIC, so the Container App pulls it with no credentials.
#
# The Docker build context is studio/ (its own dockerfile + .dockerignore); nothing outside studio/
# is needed to build the image, hence the studio/** path filter.
on:
  push:
    branches: [master]
    paths:
      - 'studio/**'                               # the Strapi app (source, config, dockerfile)
      - '.github/workflows/strapi-deploy.yml'
  workflow_dispatch:

concurrency:
  group: build-studio-image
  cancel-in-progress: true

permissions:
  contents: read
  packages: write             # push to ghcr.io with the built-in GITHUB_TOKEN

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      IMG: ghcr.io/${{ github.repository_owner }}/civstudio-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          # Build context is studio/ so the dockerfile's COPY paths + studio/.dockerignore apply.
          context: studio
          file: studio/dockerfile
          push: true
          tags: |
            ${{ env.IMG }}:${{ github.sha }}
            ${{ env.IMG }}:latest
          # GitHub Actions layer cache — the `npm ci` layer is restored when studio/package-lock.json
          # is unchanged, so a source-only change skips the multi-minute dependency install.
          cache-from: type=gha,scope=studio
          cache-to: type=gha,mode=max,scope=studio
          provenance: false

      - name: Next step (manual deploy)
        run: |
          echo "Image pushed: $IMG:${{ github.sha }}"
          echo "Roll the Strapi Container App from an authenticated az session:"
          echo "  az containerapp update -n civstudio-backend-app -g civstudio \\"
          echo "    --image $IMG:${{ github.sha }}"
