# CivStudio spectator/interactive server (Spring Boot 4). See docs/spring-boot-migration.md.
server:
  # $PORT is the container-ingress convention (Azure Container Apps); default 8080 locally.
  port: ${PORT:8080}
  # behind Azure Container Apps' ingress (TLS terminated at the edge), honor X-Forwarded-* so the
  # app reconstructs its real https://dev.civstudio.com base — needed for the Google OIDC redirect
  # URI ({baseUrl}/login/oauth2/code/google) to match what's registered. See docs/authentication.md.
  forward-headers-strategy: framework
  servlet:
    session:
      cookie:
        # the login session cookie (JSESSIONID). SameSite=Lax + the shared parent domain make it
        # same-site to both the site and the API subdomains (so it rides cross-subdomain and Lax
        # still blocks foreign cross-site POSTs). Defaults are safe for local http; production sets
        # the env overrides (domain=civstudio.com — NO leading dot, which Tomcat's RFC 6265 cookie
        # processor rejects; secure=true) — see docs/authentication.md.
        http-only: true
        same-site: ${SESSION_COOKIE_SAMESITE:lax}
        secure: ${SESSION_COOKIE_SECURE:false}
        domain: ${SESSION_COOKIE_DOMAIN:}

spring:
  application:
    name: civstudio-server
  # Spring MVC on virtual threads (Java 25): one blocking thread per request/SSE connection, cheap
  # — the shape the SSE feed's drain loop expects (see SessionController).
  threads:
    virtual:
      enabled: true
  # MCP (Model Context Protocol) server — read-only tools/resources over the live SessionHost
  # (docs/mcp-server.md Phase 2). SYNC = servlet handlers on the request thread (matches WebMVC on
  # virtual threads); STREAMABLE = the Streamable HTTP transport at /mcp. Annotation scanner picks up
  # the @McpTool/@McpResource beans in com.civstudio.server.mcp. No AI model dependency.
  ai:
    mcp:
      server:
        enabled: true
        type: SYNC
        protocol: STREAMABLE
        name: civstudio
        instructions: >-
          Read-only tools and resources over CivStudio's live simulation sessions: list sessions,
          read a session's render snapshot, a court member's character sheet, and its command log.

# Actuator: the health endpoints the Azure Container App probes hit, and that the static site
# polls (CORS-allowed in WebConfig) to wait for the server during its loading screen. Liveness /
# readiness probe groups are exposed; health details are hidden (the site only needs status:UP).
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      # Actuator endpoints use their own handler mapping (not the MVC CorsRegistry in WebConfig),
      # so the site's cross-origin health poll needs CORS configured here. Mirrors civstudio.cors.
      cors:
        allowed-origin-patterns: ${EOS_CORS_ORIGINS:https://anbennar.civstudio.com,https://civstudio.com,https://www.civstudio.com},http://localhost:*,http://127.0.0.1:*
        allowed-methods: GET,OPTIONS
        max-age: 600
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

civstudio:
  cors:
    # comma-separated; EOS_CORS_ORIGINS overrides (preserves the old FeedServer env knob).
    origins: ${EOS_CORS_ORIGINS:https://anbennar.civstudio.com,https://civstudio.com,https://www.civstudio.com}
  demo:
    enabled: true
    seed: 7654321
    province-id: 4411
    tick-rate-millis: 10000
  anbennar:
    # Canonical upstream source of the Anbennar EU4 mod files (GitLab, not GitHub). These are NOT
    # vendored in the repo; the engine (com.civstudio.data.AnbennarFiles) downloads them individually,
    # when needed, pinned to `ref` for reproducibility, and caches them under `cache-dir`. This config
    # is pushed into the engine provider at startup. See docs/anbennar-files.md.
    base-url: ${ANBENNAR_BASE_URL:https://gitlab.com/anbennar/anbennar-eu4-dev}
    # blank → the committed anbennar-source.lock is the single source of truth (see docs). Set
    # ANBENNAR_REF only for ad-hoc/testing fetches; a bump normally happens via the refresh workflow.
    ref: ${ANBENNAR_REF:}
    # local dev default; the deployment points this at a mounted volume so downloads survive restarts.
    cache-dir: ${ANBENNAR_CACHE_DIR:.anbennar-cache}
    # optional GitLab token (a secret) → authenticated rate limit. Blank = anonymous (public repo).
    token: ${ANBENNAR_TOKEN:}
  plots:
    # Per-province plot grids are generated on demand (GET /api/plots/{id}) and cached here. Local
    # dev default; the deployment MUST point this at a PERSISTENT mounted volume so a province is
    # generated once ever, not once per restart. See docs/plot-serving.md.
    cache-dir: ${PLOT_CACHE_DIR:.plot-cache}
    lru-size: ${PLOT_LRU_SIZE:512}
  mcp:
    calibration:
      # The Phase-1 calibration MCP tools (run_scenario/query the SQL run store) are OFF by default:
      # they found and run whole scenarios inside the JVM and write an H2 db, which belongs to the
      # local calibration loop, not the deployed demo. The `dev` profile below turns them on for
      # spring-boot:run. See docs/mcp-server.md §Phase 1.
      enabled: ${CIVSTUDIO_MCP_CALIBRATION_ENABLED:false}
      db: ${CIVSTUDIO_MCP_CALIBRATION_DB:output/calibration}

# dev profile (activated by spring-boot:run — see the maven plugin config): enable the local
# calibration tools so an agent pointed at http://localhost:8080/mcp can run/query scenarios.
---
spring:
  config:
    activate:
      on-profile: dev
civstudio:
  mcp:
    calibration:
      enabled: true
