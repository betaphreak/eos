# Server tests run SEQUENTIALLY — this file exists to OVERRIDE the engine's.
#
# The server depends on civstudio-engine's test-jar (for the world-bundle fixture + its
# LauncherSessionListener), and that jar ships the engine's junit-platform.properties, which turns
# on concurrent test CLASSES. Without this file the server module silently inherits it. This
# module's own target/test-classes precedes dependency jars on the classpath, so JUnit reads this
# one instead.
#
# The server suite must not run classes concurrently. Its @SpringBootTest integration tests share
# process-wide state — classes with identical properties share ONE cached Spring context, and so one
# SessionHost and its in-memory session registry. Run concurrently they corrupt each other: a
# leftover STOPPED timeline whose roster is closed to a join, a session another class already
# forgot (SessionHost.get -> null), save-slot and lobby counts that see a neighbour's runs. Each
# class passes on its own.
#
# The engine is unaffected and keeps its concurrency (its sim state is per-instance by design) —
# see civstudio-engine/src/test/resources/junit-platform.properties. Re-enabling concurrency here
# requires making these integration tests self-isolating first (a fresh context per class is not
# enough on its own).
junit.jupiter.execution.parallel.enabled=false
