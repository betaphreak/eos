<title>The Dhenijansar Migration — CivStudio caravans</title>
<style>
  :root {
    --ground: #e9edf2; --panel: #f3f6fa; --panel-2: #ffffff;
    --ink: #18202e; --ink-soft: #56617a; --ink-faint: #8b95a8;
    --line: #d3dae4; --line-soft: #e2e7ee;
    --accent: #a9690f; --accent-soft: #b57d12;
    --sea: #c3d3e6; --land: #cdd0c8; --land-hi: #b7bcae; --impass: #d5d9e0;
    --good: #3f8f5a; --cargo: #b57d12;
    --shadow: 0 1px 2px rgba(24,32,46,.08), 0 8px 24px rgba(24,32,46,.10);
    --r1: vermilion; /* placeholder, real values below */
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --ground: #0d1119; --panel: #141a26; --panel-2: #1a2130;
      --ink: #e7ecf4; --ink-soft: #9aa6ba; --ink-faint: #6b7688;
      --line: #232c3c; --line-soft: #1b2331;
      --accent: #e6b04a; --accent-soft: #e0a83a;
      --sea: #16273f; --land: #2a3446; --land-hi: #384660; --impass: #171b24;
      --good: #5ab27a; --cargo: #e0a83a;
      --shadow: 0 1px 2px rgba(0,0,0,.3), 0 10px 30px rgba(0,0,0,.4);
    }
  }
  :root[data-theme="light"] {
    --ground: #e9edf2; --panel: #f3f6fa; --panel-2: #ffffff;
    --ink: #18202e; --ink-soft: #56617a; --ink-faint: #8b95a8;
    --line: #d3dae4; --line-soft: #e2e7ee;
    --accent: #a9690f; --accent-soft: #b57d12;
    --sea: #c3d3e6; --land: #cdd0c8; --land-hi: #b7bcae; --impass: #d5d9e0;
    --good: #3f8f5a; --cargo: #b57d12;
    --shadow: 0 1px 2px rgba(24,32,46,.08), 0 8px 24px rgba(24,32,46,.10);
  }
  :root[data-theme="dark"] {
    --ground: #0d1119; --panel: #141a26; --panel-2: #1a2130;
    --ink: #e7ecf4; --ink-soft: #9aa6ba; --ink-faint: #6b7688;
    --line: #232c3c; --line-soft: #1b2331;
    --accent: #e6b04a; --accent-soft: #e0a83a;
    --sea: #16273f; --land: #2a3446; --land-hi: #384660; --impass: #171b24;
    --good: #5ab27a; --cargo: #e0a83a;
    --shadow: 0 1px 2px rgba(0,0,0,.3), 0 10px 30px rgba(0,0,0,.4);
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; background: var(--ground); color: var(--ink);
    font-family: system-ui, "Segoe UI", Roboto, sans-serif;
    font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased;
  }
  .serif { font-family: "Constantia", "Cambria", Georgia, "Times New Roman", serif; }
  .mono { font-family: "Cascadia Code", "Consolas", ui-monospace, monospace; font-variant-numeric: tabular-nums; }

  .app {
    display: grid; grid-template-columns: 1fr 392px; gap: 0;
    height: 100vh; width: 100%;
  }
  /* ---------- MAP ---------- */
  .stage { position: relative; overflow: hidden; background:
      radial-gradient(120% 120% at 30% 15%, color-mix(in srgb, var(--ground) 88%, var(--sea)) 0%, var(--ground) 60%); }
  canvas#map { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }

  .titleblock {
    position: absolute; top: 22px; left: 26px; max-width: 60%; z-index: 3;
    pointer-events: none; text-shadow: 0 1px 12px color-mix(in srgb, var(--ground) 70%, transparent);
  }
  .eyebrow {
    font-size: 11px; letter-spacing: .18em; text-transform: uppercase;
    color: var(--accent); font-weight: 600; margin: 0 0 6px;
  }
  h1.title { font-size: clamp(22px, 3vw, 34px); margin: 0; font-weight: 600; line-height: 1.05; text-wrap: balance; letter-spacing: -.01em; }
  .subtitle { color: var(--ink-soft); margin: 8px 0 0; font-size: 13px; max-width: 44ch; }

  .legend {
    position: absolute; left: 26px; bottom: 92px; z-index: 3;
    display: flex; flex-direction: column; gap: 3px;
    background: color-mix(in srgb, var(--panel) 78%, transparent);
    backdrop-filter: blur(8px); border: 1px solid var(--line);
    border-radius: 10px; padding: 10px 12px; box-shadow: var(--shadow);
  }
  .legend .lg-h { font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 3px; }
  .legrow {
    display: flex; align-items: center; gap: 9px; padding: 3px 6px; border-radius: 6px;
    cursor: pointer; border: 1px solid transparent; font-size: 12.5px; color: var(--ink-soft);
    background: none; text-align: left; width: 100%; transition: background .12s, color .12s;
  }
  .legrow:hover { background: var(--line-soft); color: var(--ink); }
  .legrow[aria-pressed="true"] { background: var(--line-soft); color: var(--ink); border-color: var(--line); }
  .legrow .dot { width: 11px; height: 3px; border-radius: 2px; flex: none; }
  .legrow.reset { color: var(--ink-faint); }
  .legrow .km { margin-left: auto; font-size: 11px; color: var(--ink-faint); font-variant-numeric: tabular-nums; }

  /* ---------- TRANSPORT ---------- */
  .transport {
    position: absolute; left: 26px; right: 26px; bottom: 20px; z-index: 4;
    display: flex; align-items: center; gap: 16px;
    background: color-mix(in srgb, var(--panel) 82%, transparent);
    backdrop-filter: blur(10px); border: 1px solid var(--line);
    border-radius: 12px; padding: 12px 16px; box-shadow: var(--shadow);
  }
  .playbtn {
    flex: none; width: 40px; height: 40px; border-radius: 50%;
    border: 1px solid var(--accent); background: color-mix(in srgb, var(--accent) 14%, transparent);
    color: var(--accent); cursor: pointer; display: grid; place-items: center;
    transition: background .12s, transform .1s;
  }
  .playbtn:hover { background: color-mix(in srgb, var(--accent) 24%, transparent); }
  .playbtn:active { transform: scale(.94); }
  .playbtn svg { width: 16px; height: 16px; fill: currentColor; }
  .tl-wrap { flex: 1; display: flex; flex-direction: column; gap: 5px; }
  .tl-dates { display: flex; justify-content: space-between; font-size: 11px; color: var(--ink-faint); }
  .datepill {
    color: var(--ink); font-weight: 600; font-size: 13px;
    font-family: "Cascadia Code", "Consolas", ui-monospace, monospace;
  }
  input[type="range"].scrub {
    -webkit-appearance: none; appearance: none; width: 100%; height: 5px; border-radius: 3px;
    background: var(--line); outline: none; cursor: pointer;
  }
  input[type="range"].scrub::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none; width: 15px; height: 15px; border-radius: 50%;
    background: var(--accent); border: 2px solid var(--panel-2); box-shadow: 0 1px 4px rgba(0,0,0,.3);
  }
  input[type="range"].scrub::-moz-range-thumb {
    width: 15px; height: 15px; border-radius: 50%; background: var(--accent);
    border: 2px solid var(--panel-2); box-shadow: 0 1px 4px rgba(0,0,0,.3);
  }
  .speed { flex: none; display: flex; gap: 2px; background: var(--line-soft); border-radius: 8px; padding: 3px; }
  .speed button {
    border: none; background: none; color: var(--ink-soft); cursor: pointer;
    font-size: 11px; padding: 4px 8px; border-radius: 6px; font-variant-numeric: tabular-nums;
  }
  .speed button[aria-pressed="true"] { background: var(--panel-2); color: var(--ink); box-shadow: var(--shadow); }

  /* province tooltip */
  .tip {
    position: absolute; z-index: 6; pointer-events: none; opacity: 0; transform: translateY(-4px);
    background: var(--panel-2); border: 1px solid var(--line); border-radius: 8px;
    padding: 7px 10px; box-shadow: var(--shadow); font-size: 12px; max-width: 220px;
    transition: opacity .1s;
  }
  .tip.on { opacity: 1; }
  .tip b { font-weight: 600; }
  .tip .r { color: var(--ink-faint); font-size: 11px; }

  /* ---------- RAIL ---------- */
  .rail {
    background: var(--panel); border-left: 1px solid var(--line);
    overflow-y: auto; padding: 22px 22px 40px; display: flex; flex-direction: column; gap: 20px;
  }
  .runmeta .rm-title { font-size: 12px; letter-spacing: .04em; color: var(--ink); font-weight: 600; }
  .runmeta .rm-sub { color: var(--ink-faint); font-size: 12px; margin-top: 2px; }
  .metagrid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; margin-top: 14px; background: var(--line); border: 1px solid var(--line); border-radius: 10px; overflow: hidden; }
  .metacell { background: var(--panel-2); padding: 10px 12px; }
  .metacell .k { font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--ink-faint); }
  .metacell .v { font-size: 18px; font-weight: 600; margin-top: 2px; font-variant-numeric: tabular-nums; }
  .metacell .v small { font-size: 11px; color: var(--ink-soft); font-weight: 400; }

  .sectlabel { font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--ink-faint); margin: 0 0 2px; }

  /* comparison table */
  table.cmp { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  table.cmp th { text-align: left; font-weight: 500; color: var(--ink-faint); font-size: 10.5px; letter-spacing: .06em; text-transform: uppercase; padding: 0 6px 6px 0; }
  table.cmp th.num, table.cmp td.num { text-align: right; font-variant-numeric: tabular-nums; }
  table.cmp td { padding: 7px 6px 7px 0; border-top: 1px solid var(--line-soft); }
  table.cmp tr.click { cursor: pointer; }
  table.cmp tr.click:hover td { background: var(--line-soft); }
  .destcell { display: flex; align-items: center; gap: 8px; }
  .destcell .dot { width: 9px; height: 9px; border-radius: 50%; flex: none; }

  /* detail card */
  .detail { display: flex; flex-direction: column; gap: 18px; }
  .backbtn { align-self: flex-start; border: 1px solid var(--line); background: var(--panel-2); color: var(--ink-soft);
    font-size: 12px; padding: 5px 11px; border-radius: 7px; cursor: pointer; display: flex; gap: 6px; align-items: center; }
  .backbtn:hover { color: var(--ink); border-color: var(--ink-faint); }
  .d-head { display: flex; align-items: baseline; gap: 10px; }
  .d-head .route-dot { width: 12px; height: 12px; border-radius: 50%; flex: none; align-self: center; }
  .d-head h2 { font-size: 20px; margin: 0; font-weight: 600; }
  .statrow { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .stat { background: var(--panel-2); border: 1px solid var(--line); border-radius: 9px; padding: 9px 11px; }
  .stat .k { font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--ink-faint); }
  .stat .v { font-size: 17px; font-weight: 600; margin-top: 3px; font-variant-numeric: tabular-nums; }

  .chart { background: var(--panel-2); border: 1px solid var(--line); border-radius: 10px; padding: 12px 12px 8px; }
  .chart .c-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
  .chart .c-title { font-size: 12px; font-weight: 600; }
  .chart .c-now { font-size: 12px; font-variant-numeric: tabular-nums; }
  .chart svg { width: 100%; height: 96px; display: block; overflow: visible; }

  .cargo-list { display: flex; flex-direction: column; gap: 7px; }
  .cargo-item { display: grid; grid-template-columns: 92px 1fr auto; gap: 9px; align-items: center; font-size: 12px; }
  .cargo-item .cname { color: var(--ink-soft); text-transform: capitalize; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cargo-bar { height: 7px; border-radius: 4px; background: var(--line); overflow: hidden; }
  .cargo-bar > i { display: block; height: 100%; border-radius: 4px; background: var(--cargo); }
  .cargo-item .cval { font-variant-numeric: tabular-nums; color: var(--ink); font-size: 11.5px; }
  .cargo-more { color: var(--ink-faint); font-size: 11.5px; }

  .footnote { color: var(--ink-faint); font-size: 11px; line-height: 1.5; border-top: 1px solid var(--line-soft); padding-top: 14px; }
  .footnote code { font-family: "Cascadia Code","Consolas",ui-monospace,monospace; color: var(--ink-soft); }

  .themebtn {
    position: absolute; top: 22px; right: 22px; z-index: 5; width: 34px; height: 34px; border-radius: 8px;
    border: 1px solid var(--line); background: color-mix(in srgb, var(--panel) 80%, transparent);
    color: var(--ink-soft); cursor: pointer; display: grid; place-items: center; backdrop-filter: blur(6px);
  }
  .themebtn:hover { color: var(--ink); }

  @media (max-width: 900px) {
    .app { grid-template-columns: 1fr; grid-template-rows: 62vh 1fr; height: auto; }
    .rail { border-left: none; border-top: 1px solid var(--line); }
    .titleblock { max-width: 76%; }
    .legend { bottom: 96px; }
  }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
</style>

<div class="app">
  <div class="stage" id="stage">
    <canvas id="map"></canvas>

    <div class="titleblock">
      <p class="eyebrow">CivStudio · seed 24601 · replay</p>
      <h1 class="title serif">The Dhenijansar Migration</h1>
      <p class="subtitle">Six caravans muster on the Rahen coast and strike out across the known world, foraging and hauling cargo until each reaches its distant site. A recorded run of the engine's parallel directed marches.</p>
    </div>

    <button class="themebtn" id="themeBtn" title="Toggle light / dark" aria-label="Toggle theme">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M19.1 4.9l-1.4 1.4M6.3 17.7l-1.4 1.4"/></svg>
    </button>

    <div class="legend" id="legend" aria-label="Caravan journeys"></div>

    <div class="transport">
      <button class="playbtn" id="playBtn" aria-label="Play"><svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>
      <div class="tl-wrap">
        <div class="tl-dates"><span id="dLo"></span><span class="datepill mono" id="dNow"></span><span id="dHi"></span></div>
        <input type="range" class="scrub" id="scrub" min="0" max="1000" value="0" aria-label="Timeline">
      </div>
      <div class="speed" id="speed" role="group" aria-label="Playback speed"></div>
    </div>

    <div class="tip" id="tip"></div>
  </div>

  <aside class="rail" id="rail"></aside>
</div>

<script>
const BUNDLE = /*__BUNDLE__*/ null;
const ROUTE_COLORS = ["#d9603b", "#3d9bd1", "#57b368", "#9b7bd4", "#d98cae", "#c9a227"];

// ---- data prep ----
const J = BUNDLE.journeys.map((j, i) => ({ ...j, color: ROUTE_COLORS[i % ROUTE_COLORS.length], idx: i }));
const P = BUNDLE.provinces;
const day = s => Date.UTC(+s.slice(0,4), +s.slice(5,7)-1, +s.slice(8,10)) / 864e5;
const t0 = day(BUNDLE.meta.dateStart), t1 = day(BUNDLE.meta.dateEnd);
const fmtDate = t => { const d = new Date(t*864e5); return d.toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric",timeZone:"UTC"}); };
const fmtInt = n => Math.round(n).toLocaleString("en-US");
J.forEach(j => j.keys.forEach(k => k.t = day(k.date)));

// projection over province lon/lat, aspect-preserving
const lons = P.map(p=>p.lon), lats = P.map(p=>p.lat);
const bbox = { lo: Math.min(...lons), hi: Math.max(...lons), la: Math.min(...lats), ha: Math.max(...lats) };
let VIEW = { w:0, h:0, scale:1, ox:0, oy:0, dpr:1 };
function fitView(w, h) {
  const pad = 54;
  const dLon = bbox.hi - bbox.lo, dLat = bbox.ha - bbox.la;
  const s = Math.min((w-2*pad)/dLon, (h-2*pad)/dLat);
  VIEW.w=w; VIEW.h=h; VIEW.scale=s;
  VIEW.ox = (w - dLon*s)/2 - bbox.lo*s;
  VIEW.oy = (h - dLat*s)/2 + bbox.ha*s;   // flip y (north up)
}
const px = lon => lon*VIEW.scale + VIEW.ox;
const py = lat => -lat*VIEW.scale + VIEW.oy;

// ---- canvas ----
const cv = document.getElementById("map"), ctx = cv.getContext("2d");
const stage = document.getElementById("stage");
function resize() {
  const r = stage.getBoundingClientRect(), dpr = Math.min(window.devicePixelRatio||1, 2);
  cv.width = r.width*dpr; cv.height = r.height*dpr; VIEW.dpr = dpr;
  fitView(r.width, r.height); draw();
}
const cssVar = n => getComputedStyle(document.documentElement).getPropertyValue(n).trim();

let hoverProv = null;
let selected = null;          // journey idx or null
let curT = t0;

function journeyPos(j, t) {
  const ks = j.keys;
  if (t <= ks[0].t) return { lon: ks[0].lon, lat: ks[0].lat, k: ks[0], arrived: false, started: t >= t0 };
  const last = ks[ks.length-1];
  if (t >= last.t) return { lon: last.lon, lat: last.lat, k: last, arrived: true, started: true };
  let i = 0; while (i < ks.length-1 && ks[i+1].t <= t) i++;
  const a = ks[i], b = ks[i+1], f = (t - a.t) / Math.max(1, b.t - a.t);
  return { lon: a.lon + (b.lon-a.lon)*f, lat: a.lat + (b.lat-a.lat)*f, k: a, arrived: false, started: true };
}
// interpolate a scalar telemetry field along keyframes
function lerpField(j, t, field) {
  const ks = j.keys;
  if (t <= ks[0].t) return ks[0][field];
  const last = ks[ks.length-1]; if (t >= last.t) return last[field];
  let i=0; while (i<ks.length-1 && ks[i+1].t<=t) i++;
  const a=ks[i], b=ks[i+1], f=(t-a.t)/Math.max(1,b.t-a.t);
  return a[field] + (b[field]-a[field])*f;
}

function draw() {
  const w=VIEW.w, h=VIEW.h, dpr=VIEW.dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,w,h);
  const cSea=cssVar("--sea"), cLand=cssVar("--land"), cLandHi=cssVar("--land-hi"), cImpass=cssVar("--impass");
  const cLine=cssVar("--line"), cAccent=cssVar("--accent"), cInk=cssVar("--ink"), cInkSoft=cssVar("--ink-soft");

  // province cloud
  for (const p of P) {
    const x=px(p.lon), y=py(p.lat);
    const water = p.type==="SEA" || p.type==="LAKE";
    const rad = water ? 2.1 : 1.6 + Math.min(3.2, Math.sqrt(p.plots||4)*0.42);
    ctx.beginPath(); ctx.arc(x,y,rad,0,7);
    ctx.fillStyle = water ? cSea : (p.type==="IMPASSABLE" ? cImpass : cLand);
    ctx.globalAlpha = water ? .55 : .9; ctx.fill(); ctx.globalAlpha = 1;
  }
  // hovered province ring
  if (hoverProv) {
    const x=px(hoverProv.lon), y=py(hoverProv.lat);
    ctx.beginPath(); ctx.arc(x,y,6,0,7); ctx.strokeStyle=cInk; ctx.lineWidth=1.4; ctx.stroke();
  }

  // routes (dim when another is selected)
  J.forEach(j => {
    const dim = selected!==null && selected!==j.idx;
    ctx.beginPath();
    j.keys.forEach((k,i)=>{ const x=px(k.lon), y=py(k.lat); i?ctx.lineTo(x,y):ctx.moveTo(x,y); });
    ctx.strokeStyle = j.color; ctx.globalAlpha = dim ? .12 : (selected===j.idx?.95:.62);
    ctx.lineWidth = selected===j.idx?2.6:1.6; ctx.lineJoin="round"; ctx.lineCap="round"; ctx.stroke();
    ctx.globalAlpha=1;
  });

  // origin star
  const ox=px(BUNDLE.meta.origin.lon), oy=py(BUNDLE.meta.origin.lat);
  drawStar(ox,oy,7,cAccent);
  ctx.fillStyle=cInk; ctx.font="600 12px system-ui,'Segoe UI',sans-serif"; ctx.textAlign="left"; ctx.textBaseline="middle";
  ctx.fillText(" "+BUNDLE.meta.origin.name, ox+7, oy);

  // destinations + moving caravans
  J.forEach(j => {
    const dim = selected!==null && selected!==j.idx;
    const dest = j.keys[j.keys.length-1];
    const dx=px(dest.lon), dy=py(dest.lat);
    ctx.beginPath(); ctx.arc(dx,dy,3.4,0,7); ctx.fillStyle=j.color; ctx.globalAlpha=dim?.25:1; ctx.fill(); ctx.globalAlpha=1;
    if (selected===j.idx) {
      ctx.fillStyle=cInk; ctx.font="600 11.5px system-ui,'Segoe UI',sans-serif"; ctx.textAlign="left"; ctx.textBaseline="middle";
      ctx.fillText(" "+j.dest, dx+5, dy);
    }
    const pos = journeyPos(j, curT);
    if (pos.started) {
      const x=px(pos.lon), y=py(pos.lat);
      const band = lerpField(j, curT, "band"), cargo = lerpField(j, curT, "cargo");
      ctx.globalAlpha = dim?.3:1;
      // cargo halo
      const hr = 6 + (cargo/490)*7;
      ctx.beginPath(); ctx.arc(x,y,hr,0,7); ctx.strokeStyle=j.color; ctx.globalAlpha=dim?.12:.3; ctx.lineWidth=2.5; ctx.stroke();
      ctx.globalAlpha = dim?.3:1;
      ctx.beginPath(); ctx.arc(x,y,4.5,0,7); ctx.fillStyle=j.color; ctx.fill();
      ctx.beginPath(); ctx.arc(x,y,4.5,0,7); ctx.strokeStyle=cssVar("--panel-2"); ctx.lineWidth=1.6; ctx.stroke();
      ctx.globalAlpha=1;
    }
  });
}
function drawStar(cx,cy,r,color){
  ctx.beginPath();
  for(let i=0;i<10;i++){ const a=Math.PI/5*i - Math.PI/2, rr=i%2?r*0.44:r; const x=cx+Math.cos(a)*rr, y=cy+Math.sin(a)*rr; i?ctx.lineTo(x,y):ctx.moveTo(x,y); }
  ctx.closePath(); ctx.fillStyle=color; ctx.fill();
  ctx.strokeStyle=cssVar("--panel-2"); ctx.lineWidth=1.2; ctx.stroke();
}

// ---- timeline ----
const scrub=document.getElementById("scrub"), dNow=document.getElementById("dNow");
document.getElementById("dLo").textContent = fmtDate(t0);
document.getElementById("dHi").textContent = fmtDate(t1);
function setT(t, fromInput){
  curT = Math.max(t0, Math.min(t1, t));
  dNow.textContent = fmtDate(curT);
  if(!fromInput) scrub.value = Math.round((curT-t0)/(t1-t0)*1000);
  draw();
  if (selected!==null) updateDetailLive();
}
scrub.addEventListener("input", ()=> setT(t0 + (+scrub.value/1000)*(t1-t0), true));

let playing=false, speed=2, raf=0, lastTs=0;
const DAYS_PER_SEC = {1:120, 2:340, 3:900};
const playBtn=document.getElementById("playBtn"), playIcon=document.getElementById("playIcon");
function tick(ts){
  if(!playing) return;
  if(lastTs){ const dt=(ts-lastTs)/1000; setT(curT + dt*DAYS_PER_SEC[speed]); if(curT>=t1){ pause(); } }
  lastTs=ts; raf=requestAnimationFrame(tick);
}
function play(){ if(curT>=t1) setT(t0); playing=true; lastTs=0; playIcon.innerHTML='<path d="M6 5h4v14H6zM14 5h4v14h-4z"/>'; playBtn.setAttribute("aria-label","Pause"); raf=requestAnimationFrame(tick); }
function pause(){ playing=false; cancelAnimationFrame(raf); playIcon.innerHTML='<path d="M8 5v14l11-7z"/>'; playBtn.setAttribute("aria-label","Play"); }
playBtn.addEventListener("click", ()=> playing?pause():play());
const reduce = matchMedia("(prefers-reduced-motion: reduce)").matches;

const speedBox=document.getElementById("speed");
[[1,"0.5×"],[2,"1×"],[3,"2×"]].forEach(([v,lab])=>{
  const b=document.createElement("button"); b.textContent=lab; b.setAttribute("aria-pressed", v===speed);
  b.onclick=()=>{ speed=v; [...speedBox.children].forEach(c=>c.setAttribute("aria-pressed", c===b)); };
  speedBox.appendChild(b);
});

// ---- legend ----
const legend=document.getElementById("legend");
legend.innerHTML = '<div class="lg-h">Caravans → destination</div>';
J.forEach(j=>{
  const b=document.createElement("button"); b.className="legrow"; b.setAttribute("aria-pressed","false");
  b.innerHTML = `<span class="dot" style="background:${j.color}"></span><span>${j.dest}</span><span class="km">${j.provinceCount} prov</span>`;
  b.onclick=()=> selectJourney(selected===j.idx?null:j.idx);
  j._leg=b; legend.appendChild(b);
});

// ---- interaction: hover province ----
const tip=document.getElementById("tip");
stage.addEventListener("mousemove", e=>{
  const r=stage.getBoundingClientRect(), mx=e.clientX-r.left, my=e.clientY-r.top;
  let best=null, bd=1e9;
  for(const p of P){ const dx=px(p.lon)-mx, dy=py(p.lat)-my, d=dx*dx+dy*dy; if(d<bd){bd=d;best=p;} }
  if(bd < 90){ hoverProv=best;
    tip.innerHTML=`<b>${best.name}</b> <span class="r">${best.type.toLowerCase()}</span><br><span class="r">${(best.region||"—").replace(/_/g," ").replace(" region","")} · ${best.plots} plots</span>`;
    tip.style.left=Math.min(mx+14, r.width-230)+"px"; tip.style.top=(my+14)+"px"; tip.classList.add("on");
  } else { hoverProv=null; tip.classList.remove("on"); }
  draw();
});
stage.addEventListener("mouseleave", ()=>{ hoverProv=null; tip.classList.remove("on"); draw(); });
stage.addEventListener("click", e=>{
  const r=stage.getBoundingClientRect(), mx=e.clientX-r.left, my=e.clientY-r.top;
  // click near a route's current marker or destination selects it
  let best=null,bd=1e9;
  J.forEach(j=>{ const d=j.keys[j.keys.length-1]; const dx=px(d.lon)-mx,dy=py(d.lat)-my,dd=dx*dx+dy*dy; if(dd<bd){bd=dd;best=j;} });
  if(best && bd<160) selectJourney(selected===best.idx?null:best.idx);
});

// ---- rail ----
const rail=document.getElementById("rail");
function selectJourney(idx){
  selected=idx;
  J.forEach(j=> j._leg.setAttribute("aria-pressed", j.idx===idx));
  renderRail(); draw();
}
function railMeta(){
  const m=BUNDLE.meta;
  const span = ((t1-t0)/365.25).toFixed(1);
  return `<div class="runmeta">
    <div class="rm-title serif" style="font-size:16px">Run summary</div>
    <div class="rm-sub"><code class="mono" style="color:var(--accent)">${m.scenario}</code> · seed ${m.seed}</div>
    <div class="metagrid">
      <div class="metacell"><div class="k">Caravans</div><div class="v">${J.length}</div></div>
      <div class="metacell"><div class="k">Provinces mapped</div><div class="v">${P.length}</div></div>
      <div class="metacell"><div class="k">Origin</div><div class="v" style="font-size:15px">${m.origin.name}</div></div>
      <div class="metacell"><div class="k">Span</div><div class="v">${span}<small> yrs</small></div></div>
    </div></div>`;
}
function sparkline(j, field, color, opts={}){
  const ks=j.keys, W=300, H=96, pad=6;
  const xs=ks.map(k=>k.t), ys=ks.map(k=>k[field]);
  const xmin=xs[0], xmax=xs[xs.length-1], ymax=Math.max(opts.ymax||0, ...ys), ymin=0;
  const X=t=> pad + (t-xmin)/(xmax-xmin)*(W-2*pad);
  const Y=v=> H-pad - (v-ymin)/((ymax-ymin)||1)*(H-2*pad);
  let d="", area="";
  ks.forEach((k,i)=>{ const x=X(k.t),y=Y(k[field]); d+=(i?"L":"M")+x.toFixed(1)+" "+y.toFixed(1)+" "; });
  area = d + `L ${X(xmax).toFixed(1)} ${(H-pad)} L ${X(xmin).toFixed(1)} ${(H-pad)} Z`;
  // now marker
  const nv = lerpField(j, curT, field), nx = X(Math.max(xmin,Math.min(xmax,curT))), ny=Y(nv);
  const grid=[0.5].map(f=>`<line x1="${pad}" y1="${(Y(ymax*f)).toFixed(1)}" x2="${W-pad}" y2="${(Y(ymax*f)).toFixed(1)}" stroke="var(--line-soft)" stroke-width="1"/>`).join("");
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <defs><linearGradient id="g${field}${j.idx}" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="${color}" stop-opacity="0.28"/><stop offset="1" stop-color="${color}" stop-opacity="0"/>
    </linearGradient></defs>
    ${grid}
    <path d="${area}" fill="url(#g${field}${j.idx})"/>
    <path d="${d}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round"/>
    <line x1="${nx.toFixed(1)}" y1="${pad}" x2="${nx.toFixed(1)}" y2="${H-pad}" stroke="var(--ink-faint)" stroke-width="1" stroke-dasharray="2 3"/>
    <circle cx="${nx.toFixed(1)}" cy="${ny.toFixed(1)}" r="3.5" fill="${color}" stroke="var(--panel-2)" stroke-width="1.5"/>
  </svg>`;
}
function parseCarrying(s){
  if(!s) return {items:[], more:0};
  const more = (s.match(/\(\+(\d+) more\)/)||[])[1];
  const items = s.replace(/\s*\(\+\d+ more\)/,"").split(";").map(x=>x.trim()).filter(Boolean).map(x=>{
    const m=x.match(/^(.*?)\s+(\d+)$/); return m?{name:m[1].replace(/_/g," "), n:+m[2]}:{name:x,n:0};
  });
  return {items, more: more?+more:0};
}
function renderRail(){
  if(selected===null){
    const rows = J.map(j=>`<tr class="click" data-idx="${j.idx}">
        <td><div class="destcell"><span class="dot" style="background:${j.color}"></span>${j.dest}</div></td>
        <td class="num">${j.provinceCount}</td>
        <td class="num">${(j.days/365.25).toFixed(1)}y</td>
        <td class="num" style="color:var(--cargo)">${j.cargoFinal}</td>
      </tr>`).join("");
    rail.innerHTML = railMeta() + `
      <div>
        <p class="sectlabel">The six journeys</p>
        <table class="cmp">
          <thead><tr><th>Destination</th><th class="num">Prov</th><th class="num">Time</th><th class="num">Cargo</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
      <p class="footnote">All six bands leave <b>${BUNDLE.meta.origin.name}</b> on <span class="mono">${BUNDLE.meta.dateStart}</span> and march the province graph one daylight-bounded leg per day, foraging food and gathering trade goods into a capacity-capped cargo. Hover the map to read a province; pick a route on the map or a row below to follow one band. Scrub or press play to watch them travel.</p>`;
    rail.querySelectorAll("tr.click").forEach(tr=> tr.onclick=()=> selectJourney(+tr.dataset.idx));
  } else {
    const j=J[selected];
    rail.innerHTML = `
      <button class="backbtn" id="back">← All caravans</button>
      <div class="detail">
        <div class="d-head"><span class="route-dot" style="background:${j.color}"></span>
          <h2 class="serif">${j.dest}</h2></div>
        <div class="rm-sub" style="color:var(--ink-soft);margin-top:-8px">from ${BUNDLE.meta.origin.name} · <span class="mono">${j.startDate}</span> → <span class="mono">${j.endDate}</span></div>
        <div class="statrow">
          <div class="stat"><div class="k">Provinces</div><div class="v">${j.provinceCount}</div></div>
          <div class="stat"><div class="k">Duration</div><div class="v">${(j.days/365.25).toFixed(1)}<small style="font-size:11px;color:var(--ink-soft)"> yr</small></div></div>
          <div class="stat"><div class="k">Band now</div><div class="v" id="bandNow">–</div></div>
        </div>
        <div class="chart">
          <div class="c-head"><span class="c-title">Cargo hauled</span><span class="c-now mono" id="cargoNow" style="color:var(--cargo)"></span></div>
          ${sparkline(j,"cargo",cssVar("--cargo"),{ymax:500})}
        </div>
        <div class="chart">
          <div class="c-head"><span class="c-title">Larder (food carried)</span><span class="c-now mono" id="larderNow" style="color:var(--good)"></span></div>
          ${sparkline(j,"larder",cssVar("--good"))}
        </div>
        <div>
          <p class="sectlabel">Cargo on arrival · ${j.cargoFinal} units</p>
          <div class="cargo-list" id="cargoList"></div>
        </div>
        <p class="footnote">Foraging refills the larder while daylight allows; surplus daylight is spent gathering the trade goods the band crosses — only those whose reveal-tech it knows — into <code>Cargo</code>, capped at hold capacity. This band arrives at <b>${j.dest}</b> carrying the goods below.</p>
      </div>`;
    document.getElementById("back").onclick=()=> selectJourney(null);
    const {items,more}=parseCarrying(j.carryingFinal);
    const mx=Math.max(...items.map(i=>i.n),1);
    document.getElementById("cargoList").innerHTML = items.map(it=>`
      <div class="cargo-item"><span class="cname" title="${it.name}">${it.name}</span>
        <span class="cargo-bar"><i style="width:${(it.n/mx*100).toFixed(0)}%"></i></span>
        <span class="cval">${it.n}</span></div>`).join("") + (more?`<div class="cargo-more">+ ${more} more goods</div>`:"");
    updateDetailLive();
  }
}
function updateDetailLive(){
  const j=J[selected]; if(!j) return;
  const cn=document.getElementById("cargoNow"), ln=document.getElementById("larderNow"), bn=document.getElementById("bandNow");
  if(cn) cn.textContent = fmtInt(lerpField(j,curT,"cargo"))+" u";
  if(ln) ln.textContent = fmtInt(lerpField(j,curT,"larder"));
  if(bn) bn.textContent = Math.round(lerpField(j,curT,"band"));
  // re-render sparkline now-markers cheaply by redrawing rail charts' vertical line:
  const charts=rail.querySelectorAll(".chart svg");
  const fields=["cargo","larder"];
  charts.forEach((svg,i)=>{
    const ks=j.keys, W=300,H=96,pad=6, xmin=ks[0].t, xmax=ks[ks.length-1].t;
    const X=t=> pad+(t-xmin)/(xmax-xmin)*(W-2*pad);
    const ymax=(fields[i]==="cargo")?500:Math.max(...ks.map(k=>k.larder));
    const Y=v=> H-pad-(v/((ymax)||1))*(H-2*pad);
    const nx=X(Math.max(xmin,Math.min(xmax,curT))), nv=lerpField(j,curT,fields[i]), ny=Y(nv);
    const line=svg.querySelector("line[stroke-dasharray]"), c=svg.querySelector("circle");
    if(line){ line.setAttribute("x1",nx.toFixed(1)); line.setAttribute("x2",nx.toFixed(1)); }
    if(c){ c.setAttribute("cx",nx.toFixed(1)); c.setAttribute("cy",ny.toFixed(1)); }
  });
}

// ---- theme toggle ----
const themeBtn=document.getElementById("themeBtn");
themeBtn.onclick=()=>{
  const cur=document.documentElement.getAttribute("data-theme")
    || (matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light");
  document.documentElement.setAttribute("data-theme", cur==="dark"?"light":"dark");
  draw(); if(selected!==null) renderRail();
};
matchMedia("(prefers-color-scheme: dark)").addEventListener("change", ()=>{ draw(); });

// ---- boot ----
window.addEventListener("resize", resize);
resize();
setT(t0);
renderRail();
if(!reduce) setTimeout(play, 650);
</script>
