<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CivStudio · Anbennar</title>
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="stylesheet" href="styles.css">
  <style>
    #modeToggle{position:absolute;top:16px;left:50%;transform:translateX(-50%);z-index:6;display:flex;gap:2px;background:rgba(10,14,22,.72);border:1px solid rgba(190,205,230,.16);border-radius:9px;padding:3px;backdrop-filter:blur(6px)}
    #modeToggle button{font:600 11px system-ui,'Segoe UI',sans-serif;letter-spacing:.02em;color:#9fb0c8;background:transparent;border:0;border-radius:6px;padding:5px 12px;cursor:pointer}
    #modeToggle button[aria-pressed="true"]{background:rgba(190,205,230,.16);color:#eef2f8}
  </style>
</head>
<body>
  <div class="app">
    <div class="stage" id="stage">
      <canvas id="map"></canvas>

      <div class="titleblock">
        <p class="eyebrow">CivStudio · Anbennar</p>
        <h1 class="title serif">The World of Anbennar</h1>
        <p class="subtitle">Six caravans muster on the Rahen coast and strike out across the known world, foraging and hauling cargo until each reaches its distant site. A recorded run of the engine's parallel directed marches.</p>
      </div>

      <div id="modeToggle" role="group" aria-label="Map mode">
        <button data-mode="world" aria-pressed="true" data-tip="Whole-world map view">World</button>
        <button data-mode="caravan" aria-pressed="false" data-tip="Replay the six-band caravan migration">Caravan</button>
      </div>

      <!-- search: a top-right pill in the same chrome as the buttons, always the rightmost control -->
      <div class="searchbar" role="search">
        <svg class="search-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input type="text" id="search" placeholder="Find a province…" autocomplete="off" spellcheck="false" aria-label="Search provinces">
        <button id="searchClear" class="search-clear" aria-label="Clear search" hidden>&times;</button>
        <div class="search-results" id="searchResults" role="listbox" hidden></div>
      </div>

      <button class="themebtn" id="themeBtn" style="right:280px" data-tip="Toggle light / dark theme" aria-label="Toggle theme">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M19.1 4.9l-1.4 1.4M6.3 17.7l-1.4 1.4"/></svg>
      </button>
      <button class="themebtn" id="heatBtn" style="right:322px" data-tip="Toggle caravan-days heat" aria-label="Toggle traffic heat">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M12 3s5 4 5 8.5A5 5 0 0 1 7 11.5c0-1.6 1-2.9 1-2.9s.4 1.8 1.8 1.8C10.8 7.8 12.5 6 12 3z"/></svg>
      </button>
      <button class="themebtn" id="costBtn" style="right:364px" data-tip="Terrain movement-cost overlay — zoom in to see it" aria-label="Toggle movement-cost overlay">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M3 19l6-11 4 6 2.5-4L21 19z"/></svg>
      </button>

      <button class="zoomlvl" id="zoomLevel" data-tip="Reset zoom · re-centre the world map" aria-label="Reset zoom to the world view">1×</button>

      <div id="costKey" style="display:none;position:absolute;right:16px;top:56px;z-index:6;background:rgba(10,14,22,.72);border:1px solid rgba(190,205,230,.16);border-radius:8px;padding:8px 10px;backdrop-filter:blur(6px);font:600 10px system-ui,'Segoe UI',sans-serif;color:#9fb0c8;letter-spacing:.02em">
        <div style="margin-bottom:5px">CLIMB COST · terrain</div>
        <div style="height:8px;width:128px;border-radius:4px;background:linear-gradient(90deg,#5abe46,#e6d228,#f08c1e,#d6282a)"></div>
        <div style="display:flex;justify-content:space-between;margin-top:3px"><span>flat</span><span>×2</span><span>×8</span></div>
      </div>

      <div class="legend" id="legend" aria-label="Caravan journeys"></div>

      <div class="zoomctl" aria-label="Zoom">
        <button id="zoomIn" data-tip="Zoom in" aria-label="Zoom in"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></button>
        <button id="zoomOut" data-tip="Zoom out" aria-label="Zoom out"><svg viewBox="0 0 24 24"><path d="M5 12h14"/></svg></button>
        <button id="zoomReset" data-tip="Fullscreen map (F) · 0 resets to the world" aria-label="Toggle fullscreen"><svg viewBox="0 0 24 24"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5"/></svg></button>
      </div>

      <div class="transport">
        <button class="playbtn" id="playBtn" data-tip="Play / pause the migration" aria-label="Play"><svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>
        <div class="tl-wrap">
          <div class="tl-dates"><span id="dLo"></span><span class="datepill mono" id="dNow"></span><span id="dHi"></span></div>
          <input type="range" class="scrub" id="scrub" min="0" max="1000" value="0" aria-label="Timeline">
        </div>
        <div class="speed" id="speed" role="group" aria-label="Playback speed"></div>
      </div>

      <div class="tip" id="tip"></div>
      <div class="btntip" id="btntip" role="tooltip"></div>
    </div>

    <aside class="railwrap" id="railwrap">
      <button id="railClose" class="railclose" data-tip="Close panel (Esc)" aria-label="Close panel">&times;</button>
      <div class="rail" id="rail"></div>
    </aside>
  </div>

  <!-- persistent bottom status line: surfaces errors/warnings (and any status message) -->
  <div id="statusline" role="status" aria-live="polite"></div>
  <script>
  (function () {
    var el = document.getElementById("statusline"), timer;
    function show(msg, kind) {
      if (!el || msg == null) return;
      el.textContent = String(msg);
      el.setAttribute("data-kind", kind || "info");
      el.classList.add("on");
      clearTimeout(timer);
      timer = setTimeout(function () { el.classList.remove("on"); }, 9000);
    }
    window.__status = show;
    el.addEventListener("click", function () { el.classList.remove("on"); });
    window.addEventListener("error", function (e) { show((e && e.message) || "Script error", "error"); });
    window.addEventListener("unhandledrejection", function (e) {
      var r = e && e.reason; show("Unhandled: " + ((r && r.message) || r), "error");
    });
    var ce = console.error, cw = console.warn;
    console.error = function () { show(Array.prototype.join.call(arguments, " "), "error"); return ce.apply(console, arguments); };
    console.warn  = function () { show(Array.prototype.join.call(arguments, " "), "warn");  return cw.apply(console, arguments); };
  })();
  </script>

  <script src="data.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
