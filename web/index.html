<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CivStudio · Anbennar</title>
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="stylesheet" href="styles.css">
  <style>
    /* the control groups (POV · plane · overlay) flow in the top bar between the brand and the
       search/clock; in-flow (not absolutely centred) so they never overlap the right-hand group */
    #mapControls{display:flex;gap:6px;align-items:center;flex:0 1 auto;min-width:0}
    .segToggle{display:flex;gap:2px;background:rgba(10,14,22,.55);border:1px solid rgba(190,205,230,.16);border-radius:9px;padding:3px;flex:none}
    .segToggle button{font:600 11px system-ui,'Segoe UI',sans-serif;letter-spacing:.02em;color:#9fb0c8;background:transparent;border:0;border-radius:6px;padding:5px 10px;cursor:pointer;white-space:nowrap}
    .segToggle button[aria-pressed="true"]{background:rgba(190,205,230,.16);color:#eef2f8}
    .segToggle button:disabled{opacity:.38;cursor:not-allowed}
    .segToggle .seed-input{width:62px;margin-left:3px;font:600 11px system-ui,'Segoe UI',sans-serif;color:#eef2f8;background:rgba(190,205,230,.10);border:1px solid rgba(190,205,230,.18);border-radius:6px;padding:4px 7px}
    .segToggle .seed-input::placeholder{color:#6b7688}
    .segToggle .seed-input[hidden]{display:none}
  </style>
</head>
<body>
  <div id="spinner" role="status" hidden><span class="sp-ring"></span><span class="sp-txt"></span></div>
  <div class="app">
    <header class="topbar">
      <span class="brand" id="brand" role="button" tabindex="0" data-tip="Back to server selection · reset to the world view" aria-label="Back to server selection"><span class="brand-a">CivStudio</span><span class="brand-sep">:</span> <span class="brand-b">Anbennar</span></span>
      <button class="zoomlvl" id="zoomLevel" data-tip="Reset zoom · re-centre the world map" aria-label="Reset zoom to the world view">1×</button>
      <button id="menuBtn" class="menubtn" aria-label="Map controls" aria-expanded="false" data-tip="Map controls">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>

      <div id="mapControls">
        <div id="povToggle" class="segToggle" role="group" aria-label="Camera POV">
          <button data-pov="god" aria-pressed="true" data-tip="Free god-view camera over the world">God</button>
          <button data-pov="timeline" aria-pressed="false" data-tip="Timeline camera — coming soon" disabled>Timeline</button>
        </div>
        <div id="planeToggle" class="segToggle" role="group" aria-label="Map plane">
          <button data-plane="overworld" aria-pressed="true" data-tip="Surface world — the physical terrain map">Overworld</button>
          <button data-plane="underworld" aria-pressed="false" data-tip="Subterranean world — the underground Serpentspine">Underworld</button>
        </div>
        <div id="overlayToggle" class="segToggle" role="group" aria-label="Map overlay">
          <button data-ov="none" aria-pressed="true" data-tip="No overlay — plain physical map">None</button>
          <button data-ov="nation" aria-pressed="false" data-tip="Colour provinces by owning nation at game start">Nation</button>
          <button data-ov="culture" aria-pressed="false" data-tip="Colour provinces by culture">Culture</button>
          <button data-ov="faith" aria-pressed="false" data-tip="Colour provinces by religion">Faith</button>
          <button data-ov="live" aria-pressed="false" data-tip="Watch the live server session — the colony and its caravans — in real time">Caravans</button>
        </div>
      </div>

      <div class="topright">
        <button class="themebtn" id="techBtn" data-tip="Technology tree (F7)" aria-label="Open the technology tree">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="5" cy="12" r="2.3"/><circle cx="18" cy="5.5" r="2.3"/><circle cx="18" cy="18.5" r="2.3"/><path d="M7.2 11l8.6-4.6M7.2 13l8.6 4.6"/></svg>
        </button>
        <button class="themebtn" id="costBtn" data-tip="Terrain movement-cost overlay — zoom in to see it" aria-label="Toggle movement-cost overlay">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M3 19l6-11 4 6 2.5-4L21 19z"/></svg>
        </button>
        <button class="themebtn" id="themeBtn" data-tip="Toggle light / dark theme" aria-label="Toggle theme">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M19.1 4.9l-1.4 1.4M6.3 17.7l-1.4 1.4"/></svg>
        </button>
        <div class="searchbar" role="search">
          <svg class="search-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
          <input type="text" id="search" placeholder="Find a province…" autocomplete="off" spellcheck="false" aria-label="Search provinces">
          <button id="searchClear" class="search-clear" aria-label="Clear search" hidden>&times;</button>
          <div class="search-results" id="searchResults" role="listbox" hidden></div>
        </div>
        <!-- EU4-style clock: date/time + play-pause (Space) + speed chevrons -->
        <div id="clock" role="group" aria-label="Date and playback speed">
          <button class="playbtn" id="playBtn" data-tip="Play / pause (Space)" aria-label="Play"><svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>
          <div class="clk-dt"><span id="cDate" class="clk-date"></span></div>
          <div class="clk-speed" id="speed" role="group" aria-label="Speed"></div>
        </div>
      </div>
    </header>

    <div class="stage" id="stage">
      <canvas id="map"></canvas>

      <div id="costKey" style="display:none;position:absolute;right:16px;top:56px;z-index:6;background:rgba(10,14,22,.72);border:1px solid rgba(190,205,230,.16);border-radius:8px;padding:8px 10px;backdrop-filter:blur(6px);font:600 10px system-ui,'Segoe UI',sans-serif;color:#9fb0c8;letter-spacing:.02em">
        <div style="margin-bottom:5px">CLIMB COST · terrain</div>
        <div style="height:8px;width:128px;border-radius:4px;background:linear-gradient(90deg,#5abe46,#e6d228,#f08c1e,#d6282a)"></div>
        <div style="display:flex;justify-content:space-between;margin-top:3px"><span>flat</span><span>×2</span><span>×8</span></div>
      </div>

      <div class="legend" id="polLegend" aria-label="Political legend" hidden></div>

      <div class="live-hud" id="liveHud" aria-label="Live session" hidden>
        <div class="live-head">
          <span class="live-title">LIVE</span>
          <span class="badge" id="liveState">—</span>
          <span class="live-meta">tick <b id="liveTick">0</b></span>
          <span class="live-date" id="liveDate"></span>
        </div>
        <div class="live-sid" id="liveSid"></div>
        <table class="live-stats" id="liveStats"></table>
        <div class="live-policy">
          <div class="live-cur">tax &nbsp; bank <b id="liveBankTaxCur">—</b> &nbsp; noble <b id="liveNobleTaxCur">—</b></div>
          <label>bank <input id="liveBankTax" type="number" min="0" max="1" step="0.01"></label>
          <label>noble <input id="liveNobleTax" type="number" min="0" max="1" step="0.01"></label>
          <button id="liveApplyTax">Apply</button>
        </div>
        <div class="live-msg" id="liveTaxMsg"></div>
      </div>

      <div class="zoomctl" aria-label="Zoom">
        <button id="zoomIn" data-tip="Zoom in" aria-label="Zoom in"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></button>
        <button id="zoomOut" data-tip="Zoom out" aria-label="Zoom out"><svg viewBox="0 0 24 24"><path d="M5 12h14"/></svg></button>
        <button id="zoomReset" data-tip="Fullscreen map (F) · 0 resets to the world" aria-label="Toggle fullscreen"><svg viewBox="0 0 24 24"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5"/></svg></button>
      </div>

      <div class="tip" id="tip"></div>
      <div class="btntip" id="btntip" role="tooltip"></div>

      <div id="loading" role="status" aria-label="Loading the world map">
        <img class="ld-art" alt="">
        <div class="ld-bar"></div>
        <!-- server picker: the bootstrap (below) fills #ldServers with one row per server and
             holds here until the user clicks one to connect (each row shows its online version). -->
        <div class="ld-picker" id="ldPicker" hidden>
          <div class="ld-title">CivStudio</div>
          <div class="ld-sub">Choose a server</div>
          <div class="ld-servers" id="ldServers" role="listbox" aria-label="Servers"></div>
          <div class="ld-hint">Press <kbd>Esc</kbd> or click outside to dismiss</div>
        </div>
      </div>
    </div>

    <aside class="railwrap" id="railwrap">
      <button id="railClose" class="railclose" data-tip="Close panel (Esc)" aria-label="Close panel">&times;</button>
      <div class="rail" id="rail"></div>
    </aside>

    <!-- shortcut hints; populated from js/shortcuts.mjs (the single source for the bar) -->
    <footer class="hotbar" id="hotbar" aria-label="Keyboard shortcuts"></footer>

  </div>

  <!-- Technology tree: a full-screen modal over the map (map rendering pauses while it is up).
       Populated by js/overlays/techtree.mjs on first open. -->
  <div id="techModal" class="tech-modal" hidden role="dialog" aria-modal="true" aria-label="Technology tree">
    <div class="tech-backdrop" data-tech-close></div>
    <div class="tech-shell" role="document">
      <header class="tech-head">
        <div class="tech-brand">Tech Tree (F7)</div>
        <div id="techEras" class="segToggle tech-eras" role="group" aria-label="Jump to era"></div>
        <div class="searchbar tech-searchbar" role="search">
          <svg class="search-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
          <input type="text" id="techSearch" placeholder="Search techs…" autocomplete="off" spellcheck="false" aria-label="Search technologies">
          <button id="techSearchClear" class="search-clear" aria-label="Clear search" hidden>&times;</button>
          <div class="search-results" id="techSearchResults" role="listbox" hidden></div>
        </div>
        <button class="tech-close" data-tech-close data-tip="Close (Esc)" aria-label="Close technology tree">&times;</button>
      </header>
      <div class="tech-body">
        <div id="techViewport" class="tech-viewport">
          <div id="techSizer" class="tech-sizer">
            <div id="techCanvas" class="tech-canvas">
              <svg id="techEdges" class="tech-edges" aria-hidden="true"></svg>
            </div>
          </div>
        </div>
        <div class="tech-zoomctl zoomctl" aria-label="Zoom">
          <button id="techZoomIn" data-tip="Zoom in" aria-label="Zoom in"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></button>
          <button id="techZoomOut" data-tip="Zoom out" aria-label="Zoom out"><svg viewBox="0 0 24 24"><path d="M5 12h14"/></svg></button>
        </div>
        <aside id="techDetail" class="tech-detail" hidden aria-live="polite"></aside>
      </div>
    </div>
  </div>

  <!-- persistent bottom status line: surfaces errors/warnings (and any status message) -->
  <div id="statusline" role="status" aria-live="polite"></div>
  <script>
  (function () {
    var el = document.getElementById("statusline"), timer;
    function show(msg, kind) {
      if (!el || msg == null) return;
      el.textContent = String(msg);
      el.setAttribute("data-kind", kind || "info");
      el.classList.add("on");
      clearTimeout(timer);
      timer = setTimeout(function () { el.classList.remove("on"); }, 9000);
    }
    window.__status = show;
    el.addEventListener("click", function () { el.classList.remove("on"); });
    window.addEventListener("error", function (e) { show((e && e.message) || "Script error", "error"); });
    window.addEventListener("unhandledrejection", function (e) {
      var r = e && e.reason; show("Unhandled: " + ((r && r.message) || r), "error");
    });
    var ce = console.error, cw = console.warn;
    console.error = function () { show(Array.prototype.join.call(arguments, " "), "error"); return ce.apply(console, arguments); };
    console.warn  = function () { show(Array.prototype.join.call(arguments, " "), "warn");  return cw.apply(console, arguments); };
  })();
  </script>

  <!-- window.BUNDLE (the map/geo backbone) now comes from the spectator server — the single
       source of truth, assembled by com.civstudio.server.web.WorldBundle — instead of a committed
       data.js. The loading screen holds up a SERVER PICKER (dev is the default cloud server, local
       targets a server on this machine; ?live=<url> injects a one-off custom entry). Each row shows
       the server's version, fetched online from /actuator/info. We WAIT for the user to click a
       server, then poll readiness (/actuator/health), fetch the bundle, and import the module app —
       core.mjs reads window.BUNDLE synchronously at eval time, so it must be populated first. -->
  <script>
  (function () {
    var params = new URLSearchParams(location.search);
    // dev = the default cloud server; local = a server run on this machine. ?live=<url> prepends a
    // one-off custom entry (ad-hoc testing) and preselects it. Trailing slashes trimmed; the chosen
    // base flows to the app as BUNDLE.live.base (live.mjs's LIVE_BASE fallback mirrors dev).
    var servers = [
      { id: "dev",   label: "dev",   base: "https://dev.civstudio.com" },
      { id: "local", label: "local", base: "http://localhost:8080" }
    ];
    var custom = params.get("live");
    if (custom) servers.unshift({ id: "custom", label: "custom", base: custom });
    servers.forEach(function (s) { s.base = s.base.replace(/\/+$/, ""); });
    var defaultId = custom ? "custom" : "dev";

    var loading = document.getElementById("loading");
    var picker  = document.getElementById("ldPicker");
    var listEl  = document.getElementById("ldServers");
    var art = loading && loading.querySelector(".ld-art");
    var bar = loading && loading.querySelector(".ld-bar");
    if (art && !art.getAttribute("src")) art.src = "assets/loading-1.jpg";   // committed splash behind the picker
    if (bar) bar.hidden = true;                     // no progress bar until a server is picked

    var connecting = false;
    var mode = "boot";        // "boot" = first load: pick → connect + import the app. "switch" =
                              // already connected (title re-opened it): picking reloads into that
                              // server, and the overlay is dismissable (Esc / click-outside) back
                              // to the running map.
    var sub  = loading && loading.querySelector(".ld-sub");

    function currentBase() { return (window.BUNDLE && window.BUNDLE.live && window.BUNDLE.live.base) || null; }

    // one row per server: label · host · online version · status dot. A row is clickable once its
    // probe says "up". In switch mode the currently-connected server is marked; otherwise the
    // default server's row is pre-highlighted.
    function render() {
      listEl.textContent = "";
      var cur = mode === "switch" ? currentBase() : null;
      servers.forEach(function (s) {
        var isCurrent = cur && s.base === cur;
        var row = document.createElement("button");
        row.className = "ld-srv" + (s.id === defaultId ? " is-default" : "") + (isCurrent ? " is-current" : "");
        row.type = "button"; row.setAttribute("role", "option");
        row.setAttribute("aria-selected", (isCurrent || (mode !== "switch" && s.id === defaultId)) ? "true" : "false");
        row.disabled = connecting || s.status !== "up";

        var name = document.createElement("span"); name.className = "srv-name"; name.textContent = s.label;
        var host = document.createElement("span"); host.className = "srv-host";
        host.textContent = s.base.replace(/^https?:\/\//, "");
        var meta = document.createElement("span"); meta.className = "srv-meta";
        var ver  = document.createElement("span"); ver.className = "srv-ver";
        ver.textContent = isCurrent ? ((s.version || "unknown") + " · connected")
          : s.status === "up" ? (s.version || "unknown")
          : s.status === "down" ? "offline" : "checking…";
        var dot  = document.createElement("span"); dot.className = "srv-dot srv-" + (s.status || "wait");
        meta.appendChild(ver); meta.appendChild(dot);

        row.appendChild(name); row.appendChild(host); row.appendChild(meta);
        row.addEventListener("click", function () {
          if (connecting || s.status !== "up") return;
          if (mode === "switch") select(s); else connect(s);
        });
        listEl.appendChild(row);
      });
    }
    function showPicker() { picker.hidden = false; }
    var probing = false;
    function startPicker() {                      // reveal the picker + (once) begin probing on an interval
      showPicker(); render();
      if (!probing) { probing = true; setInterval(probeAll, 5000); }
      probeAll();                                 // refresh statuses immediately (also on every re-open)
    }

    // switch to another server while already connected: a fresh page load is required (the app
    // boots once), so navigate with ?server=<id> (carrying ?live for a custom entry). Re-picking
    // the current server just dismisses the overlay.
    function select(s) {
      if (currentBase() === s.base) { closePicker(); return; }
      var q = "?server=" + encodeURIComponent(s.id);
      if (s.id === "custom") q += "&live=" + encodeURIComponent(s.base);
      location.href = location.pathname + q;
    }

    // probe a server's /actuator/info (CORS-allowed) for reachability + build.version. A response
    // means up (build.version fills the row; "unknown" for an older server without build-info); a
    // network error / non-OK means down. Re-probed on an interval so a starting server flips to up.
    function probe(s) {
      return fetch(s.base + "/actuator/info", { credentials: "omit", cache: "no-store" })
        .then(function (r) { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
        .then(function (j) { s.status = "up"; s.version = j && j.build && j.build.version; })
        .catch(function () { s.status = "down"; s.version = null; })
        .then(function () { if (!connecting) render(); });
    }
    function probeAll() { if (!connecting) servers.forEach(probe); }

    // connect to the picked server: hold the picker (rows disabled), show the progress bar, confirm
    // readiness (health), fetch the bundle, and boot the module app. On failure, surface it and
    // re-enable the picker so another server can be tried.
    function connect(s) {
      connecting = true; render();
      if (bar) bar.hidden = false;
      if (window.__status) window.__status("Connecting to " + s.label + " (" + s.base + ")…", "info");
      fetch(s.base + "/actuator/health", { credentials: "omit", cache: "no-store" })
        .then(function (r) {
          if (r.status === 404) return;                   // up, no Actuator — fall through to the bundle
          if (!r.ok) throw new Error("HTTP " + r.status);
          return r.json().then(function (h) { if (!h || h.status !== "UP") throw new Error("status " + (h && h.status)); });
        })
        .then(function () { return fetch(s.base + "/api/bundle", { credentials: "omit" }); })
        .then(function (r) { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
        .then(function (b) { b.live = { base: s.base }; window.BUNDLE = b; return import("./app.js"); })
        .catch(function (e) {
          connecting = false; s.status = "down";
          if (bar) bar.hidden = true;
          if (window.__status) window.__status("Could not reach " + s.label + " — " + (e && e.message || e), "error");
          startPicker();                        // auto-connect failed → reveal the picker (and start probing)
        });
    }

    // dismiss the overlay back to the running map — only in switch mode (in boot mode there is no
    // map yet, so a pick is mandatory and Esc/click-outside do nothing).
    function closePicker() {
      if (mode !== "switch" || picker.hidden) return;
      picker.hidden = true;
      loading.classList.remove("switch");
      loading.classList.add("gone");
    }

    // the running app (js/panel.mjs, on the title click) re-opens the picker as a dismissable
    // "switch server" overlay over the live map. Exposed on window because this boot IIFE owns the
    // server list + probes and the module app can't reach into its closure otherwise.
    window.__picker = {
      open: function () {
        mode = "switch"; connecting = false;
        if (sub) sub.textContent = "Switch server";
        if (bar) bar.hidden = true;
        loading.classList.remove("gone");
        loading.classList.add("switch");        // transparent modal over the map (styles.css)
        loading.hidden = false;
        startPicker();
      },
      close: closePicker,
      isOpen: function () { return mode === "switch" && !picker.hidden; }
    };
    // Esc, or a click on the dimmed backdrop (outside the panel), dismisses the switch overlay.
    document.addEventListener("keydown", function (e) {
      if (e.key === "Escape" && mode === "switch" && !picker.hidden) { e.preventDefault(); closePicker(); }
    });
    loading.addEventListener("click", function (e) {
      if (mode === "switch" && !picker.hidden && !picker.contains(e.target)) closePicker();
    });

    // ?server=<id> (dev|local|custom) bypasses the picker and connects straight to that server; on
    // failure connect() reveals the picker. A bare ?live=<url> also auto-connects (to its custom
    // entry) — preserving the old point-at-a-server testing shortcut. Otherwise: show the picker
    // and wait for a click.
    var auto = params.get("server") || (custom ? "custom" : null);
    var target = auto && servers.filter(function (s) { return s.id === auto; })[0];
    if (target) {
      connect(target);
    } else {
      startPicker();
    }
  })();
  </script>
</body>
</html>
