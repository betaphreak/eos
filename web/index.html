<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <!-- sign-in popup returns here: notify the opener and close immediately, before the app boots
       (window.name is set by auth.mjs's window.open). Keeps the main page from navigating. -->
  <script>if (window.name === "civstudio-login" && window.opener) { try { window.opener.postMessage("civstudio-auth", location.origin); } catch (e) {} window.close(); }</script>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CivStudio · Anbennar</title>
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="stylesheet" href="styles.css">
  <style>
    /* the control groups (POV · plane · overlay) flow in the top bar between the brand and the
       search/clock; in-flow (not absolutely centred) so they never overlap the right-hand group */
    #mapControls{display:flex;gap:6px;align-items:center;flex:0 1 auto;min-width:0}
    /* content-width floating top bar: size to its contents instead of spanning 100% */
    .topbar{right:auto;width:max-content;max-width:calc(100% - 8px);
      border-right:1px solid #232c3c;border-bottom-right-radius:12px}
    .topbar .topright{margin-left:8px}   /* pack tight after the advisor selector (no edge-to-edge stretch) */
    .segToggle{display:flex;gap:2px;background:rgba(10,14,22,.55);border:1px solid rgba(190,205,230,.16);border-radius:9px;padding:3px;flex:none}
    .segToggle button{font:600 11px system-ui,'Segoe UI',sans-serif;letter-spacing:.02em;color:#9fb0c8;background:transparent;border:0;border-radius:6px;padding:5px 10px;cursor:pointer;white-space:nowrap}
    .segToggle button[aria-pressed="true"]{background:rgba(190,205,230,.16);color:#eef2f8}
    .segToggle button:disabled{opacity:.38;cursor:not-allowed}
    .segToggle .seed-input{width:62px;margin-left:3px;font:600 11px system-ui,'Segoe UI',sans-serif;color:#eef2f8;background:rgba(190,205,230,.10);border:1px solid rgba(190,205,230,.18);border-radius:6px;padding:4px 7px}
    .segToggle .seed-input::placeholder{color:#6b7688}
    .segToggle .seed-input[hidden]{display:none}
    /* the Privy Council advisor selector + its second-row sub-control strip */
    #advisorToggle{flex-wrap:nowrap;overflow:hidden}
    #advisorToggle button{padding:5px 9px}
    #advisorToggle button.advisor-live[aria-pressed="true"]{background:rgba(255,59,59,.18);color:#ffd9d9}
    /* the sub-bar floats as its own row directly below the (absolutely-positioned) top bar; the
       stage + rail are pushed down by --subbar-h so nothing is covered */
    .app{--subbar-h:32px;--foot-h:0}   /* the bottom shortcut bar is removed; the stage reclaims its row */
    /* z-index 8 (below the top bar's 9) so a search-results dropdown spilling from the top bar into
       this row's area is not intercepted by it; still above the stage/tech map-mode */
    #advisorSubbar{position:absolute;top:var(--bar-h);left:0;right:0;height:var(--subbar-h);z-index:8;
      display:flex;align-items:center;gap:10px;padding:0 16px;
      background:#0b0f17;border-bottom:1px solid #232c3c}
    .app .stage{top:calc(var(--bar-h) + var(--subbar-h))}
    .app .railwrap{top:calc(var(--bar-h) + var(--subbar-h))}
    /* Technology Advisor (§2): the tech tree fills the stage region below the top bar + sub-bar
       instead of a full-viewport modal, so the advisor selector stays live. Leave via the selector /
       Esc / hotkey — the modal close × and backdrop are retired. The rail (when opened for the tech
       inspector) shrinks it from the right. */
    .app .tech-modal{position:absolute;inset:auto;top:calc(var(--bar-h) + var(--subbar-h));left:0;right:0;bottom:var(--foot-h);z-index:7}
    .app.rail-open .tech-modal{right:var(--rail-w)}
    .app .tech-shell{width:100%;height:100%;margin:0;border-radius:0;border:0;box-shadow:none}
    .tech-close{display:none}
    /* §5: the unified top-bar search covers techs in the Technology advisor, so the in-tree search
       box is retired (the top bar stays reachable now that the tree is a stage map-mode) */
    .tech-searchbar{display:none}
    #advisorSubbar .advisor-sub{display:flex;align-items:center;gap:8px}
    #advisorSubbar .advisor-sub[hidden]{display:none}
    #advisorSubbar .sub-cap{color:#7c8aa2;letter-spacing:.04em;text-transform:uppercase;
      font:600 10px system-ui,'Segoe UI',sans-serif}
    .live-badge{display:inline-flex;align-items:center;gap:6px;color:#ff5a5a;font:700 11px system-ui,sans-serif;letter-spacing:.10em}
    .live-badge[hidden]{display:none}   /* Twitch-style: only shown while the session is actually RUNNING */
    .live-badge .dot{width:8px;height:8px;border-radius:50%;background:#ff3b3b;box-shadow:0 0 6px #ff3b3b;animation:livepulse 1.4s ease-in-out infinite}
    @keyframes livepulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.28;transform:scale(.82)}}
    /* the court-member chip in a role advisor's sub-bar → opens the character sheet (§2b) */
    .advisor-court{font:600 11px system-ui,sans-serif;color:#cbd6ea;background:rgba(190,205,230,.10);
      border:1px solid rgba(190,205,230,.18);border-radius:7px;padding:4px 10px;cursor:pointer;white-space:nowrap}
    .advisor-court:hover{background:rgba(190,205,230,.18);color:#fff}
    .advisor-court[hidden]{display:none}
    .court-pic{display:inline-block;width:18px;height:18px;border-radius:4px;vertical-align:middle;margin-right:6px;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.12)}
    .court-pic[hidden]{display:none}
    .adv-portrait.art{background-color:transparent}
    /* the advisor character sheet in the right rail */
    .advisor-sheet{padding:14px 16px;color:#dfe6f2;overflow-y:auto}
    .adv-head{display:flex;gap:12px;align-items:center;margin-bottom:6px}
    .adv-portrait{width:52px;height:52px;border-radius:10px;flex:none;display:flex;align-items:center;justify-content:center;
      font:700 18px system-ui,sans-serif;color:#fff;background:hsl(var(--h,210) 42% 44%);box-shadow:inset 0 0 0 1px rgba(255,255,255,.12)}
    .adv-name{font:700 16px system-ui,sans-serif;color:#f2f6fc}
    .adv-role{font:600 11px system-ui,sans-serif;color:#9fb0c8;letter-spacing:.02em;margin-top:2px}
    .adv-sub{font:500 11px system-ui,sans-serif;color:#7c8aa2;margin-top:1px}
    .adv-sec{font:700 10px system-ui,sans-serif;letter-spacing:.10em;text-transform:uppercase;color:#7c8aa2;margin:14px 0 7px}
    .adv-skill{display:grid;grid-template-columns:104px 1fr 22px;align-items:center;gap:8px;margin:3px 0;font:600 11px system-ui,sans-serif;color:#b7c2d6}
    .adv-skill.hot .adv-sk-name{color:#e6b04a}
    .adv-sk-bar{height:6px;border-radius:3px;background:rgba(190,205,230,.12);overflow:hidden}
    .adv-sk-bar>span{display:block;height:100%;background:linear-gradient(90deg,#4a86c8,#6fb0e0)}
    .adv-skill.hot .adv-sk-bar>span{background:linear-gradient(90deg,#e0a83a,#f0c869)}
    .adv-sk-lvl{text-align:right;color:#dfe6f2;font-variant-numeric:tabular-nums}
    .adv-flame{color:#e6733a;font-weight:800}
    .adv-house .adv-member{display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center;padding:5px 0;
      border-top:1px solid rgba(190,205,230,.07);font:500 12px system-ui,sans-serif}
    .adv-m-name{color:#dfe6f2}.adv-m-rel{color:#8b95a8;font-size:11px;text-transform:capitalize}
    .adv-m-age{color:#9fb0c8;font-variant-numeric:tabular-nums}
    .adv-member.dead{opacity:.5}
    .adv-dim{color:#7c8aa2;font-size:12px;padding:4px 0}
    /* transient toasts (advisor succession, §2b) */
    #toastHost{position:fixed;right:16px;bottom:44px;z-index:60;display:flex;flex-direction:column;gap:8px;max-width:320px;pointer-events:none}
    .toast{pointer-events:auto;display:flex;gap:9px;align-items:flex-start;background:#141a26;color:#e7ecf4;
      border:1px solid #2b3546;border-left:3px solid #e6b04a;border-radius:9px;padding:10px 12px;cursor:pointer;
      box-shadow:0 8px 24px rgba(0,0,0,.42);font:500 12px system-ui,'Segoe UI',sans-serif;line-height:1.4;
      opacity:0;transform:translateY(8px);transition:opacity .22s ease,transform .22s ease}
    .toast.in{opacity:1;transform:none}
    .toast b{color:#f2f6fc;font-weight:700}
    .toast-ic{color:#e6b04a;font-size:15px;line-height:1.1;flex:none}
  </style>
</head>
<body>
  <div id="spinner" role="status" hidden><span class="sp-ring"></span><span class="sp-txt"></span></div>
  <div class="app">
    <header class="topbar">
      <div id="mapControls">
        <!-- the zoom-level / band chip (rewritten by main.mjs) sits in the Map-controls flex; zoom persists across advisors -->
        <button class="zoomlvl" id="zoomLevel" data-tip="Reset zoom · re-centre the world map" aria-label="Reset zoom to the world view">1×</button>
        <!-- the Privy Council advisor selector — one segment per Civ4-style advisor mode; built by
             js/advisors.mjs. Replaces the old POV/plane/overlay toggle groups (folded into this + the
             second-row sub-bar). -->
        <div id="advisorToggle" class="segToggle" role="group" aria-label="Advisor mode"></div>
      </div>

      <div class="topright">
        <button class="themebtn" id="costBtn" data-tip="Terrain movement-cost overlay — zoom in to see it" aria-label="Toggle movement-cost overlay">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M3 19l6-11 4 6 2.5-4L21 19z"/></svg>
        </button>
        <div class="searchbar" role="search">
          <svg class="search-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
          <input type="text" id="search" placeholder="Find a province…" autocomplete="off" spellcheck="false" aria-label="Search provinces">
          <button id="searchClear" class="search-clear" aria-label="Clear search" hidden>&times;</button>
          <div class="search-results" id="searchResults" role="listbox" hidden></div>
        </div>
      </div>
    </header>

    <!-- second row: the active advisor's sub-control strip (swaps per advisor; js/advisors.mjs
         shows one [data-sub] slot at a time). The plane toggle lives in the Globe slot so panel.mjs
         still wires it; the Foreign slot's Nation/Culture buttons carry data-ov (setOverlay repaints
         them by attribute). Era tabs / richer Zeitgeist transport move here in later steps. -->
    <div id="advisorSubbar">
      <div class="advisor-sub" data-sub="mainmap" hidden><span class="sub-cap">Physical world · terrain &amp; plots</span></div>
      <div class="advisor-sub" data-sub="foreign" hidden>
        <div class="segToggle" role="group" aria-label="Foreign view">
          <button data-ov="nation" data-tip="Colour provinces by owning nation at game start">Nation</button>
          <button data-ov="culture" data-tip="Colour provinces by culture">Culture</button>
        </div>
        <button class="advisor-court" hidden></button>
      </div>
      <div class="advisor-sub" data-sub="religion" hidden><span class="sub-cap">Provinces coloured by religion</span><button class="advisor-court" hidden></button></div>
      <div class="advisor-sub" data-sub="technology" hidden><span class="sub-cap">Technology tree</span><button class="advisor-court" hidden></button></div>
      <div class="advisor-sub" data-sub="globe" hidden>
        <div id="planeToggle" class="segToggle" role="group" aria-label="Map plane">
          <button data-plane="overworld" aria-pressed="true" data-tip="Surface world — the physical terrain map">Overworld</button>
          <button data-plane="underworld" aria-pressed="false" data-tip="Subterranean world — the underground Serpentspine">Underworld</button>
        </div>
      </div>
      <!-- Zeitgeist = the live/social/account advisor: LIVE badge + the play/speed transport + the
           sign-in handle/logout (auth.mjs renders into #siteAuth wherever it lives). Relocated here
           from the top bar (§4). -->
      <div class="advisor-sub" data-sub="zeitgeist" hidden>
        <span class="live-badge" hidden><span class="dot"></span>LIVE</span>
        <!-- EU4-style clock: date/time + play-pause (Space) + speed chevrons -->
        <div id="clock" role="group" aria-label="Date and playback speed">
          <button class="playbtn" id="playBtn" data-tip="Play / pause (Space)" aria-label="Play"><svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>
          <div class="clk-dt"><span id="cDate" class="clk-date"></span></div>
          <div class="clk-speed" id="speed" role="group" aria-label="Speed"></div>
        </div>
        <!-- sign-in for the picked server (Steam / OIDC); filled by js/auth.mjs -->
        <div class="site-auth" id="siteAuth" style="margin-left:auto"></div>
      </div>
    </div>

    <div class="stage" id="stage">
      <canvas id="map"></canvas>
      <!-- the wordmark, moved off the top bar (§ space-saving) into a faint, unobtrusive watermark over
           the map; still clickable (back to server selection · reset to the world view) -->
      <span class="brand brand-watermark" id="brand" role="button" tabindex="0" data-tip="Back to server selection · reset to the world view" aria-label="Back to server selection"><span class="brand-a">CivStudio</span><span class="brand-sep">:</span> <span class="brand-b">Anbennar</span></span>
      <div class="regime-pulse" id="regimePulse" aria-hidden="true"></div>

      <div id="costKey" style="display:none;position:absolute;right:16px;top:56px;z-index:6;background:rgba(10,14,22,.72);border:1px solid rgba(190,205,230,.16);border-radius:8px;padding:8px 10px;backdrop-filter:blur(6px);font:600 10px system-ui,'Segoe UI',sans-serif;color:#9fb0c8;letter-spacing:.02em">
        <div style="margin-bottom:5px">CLIMB COST · terrain</div>
        <div style="height:8px;width:128px;border-radius:4px;background:linear-gradient(90deg,#5abe46,#e6d228,#f08c1e,#d6282a)"></div>
        <div style="display:flex;justify-content:space-between;margin-top:3px"><span>flat</span><span>×2</span><span>×8</span></div>
      </div>

      <div class="legend" id="polLegend" aria-label="Political legend" hidden></div>

      <div class="live-hud" id="liveHud" aria-label="Live session" hidden>
        <div class="live-head">
          <span class="live-title">LIVE</span>
          <span class="badge" id="liveState">—</span>
          <span class="live-meta">tick <b id="liveTick">0</b></span>
          <span class="live-date" id="liveDate"></span>
        </div>
        <div class="live-sid" id="liveSid"></div>
        <table class="live-stats" id="liveStats"></table>
        <div class="live-policy">
          <div class="live-cur">tax &nbsp; bank <b id="liveBankTaxCur">—</b> &nbsp; noble <b id="liveNobleTaxCur">—</b></div>
          <label>bank <input id="liveBankTax" type="number" min="0" max="1" step="0.01"></label>
          <label>noble <input id="liveNobleTax" type="number" min="0" max="1" step="0.01"></label>
          <button id="liveApplyTax">Apply</button>
        </div>
        <div class="live-msg" id="liveTaxMsg"></div>
      </div>

      <!-- live event-log bar: collapsed = latest line; click to expand a chat-style history (js/livelog.mjs) -->
      <div class="live-log" id="liveLog" hidden>
        <div class="live-log-history" id="liveLogHistory" hidden>
          <div class="live-log-head">
            <span>LOBBY</span>
            <label class="live-log-toggle"><input type="checkbox" id="liveLogAll"> show all</label>
          </div>
          <div class="live-log-lines" id="liveLogLines"></div>
          <div class="live-log-chat">
            <input id="liveLogChatInput" type="text" maxlength="280" autocomplete="off" placeholder="Say something…">
            <button id="liveLogChatSend">Send</button>
            <span class="live-log-chat-hint">Sign in to chat</span>
          </div>
        </div>
        <div class="live-log-latest" id="liveLogLatest" role="button" tabindex="0"
             title="Click to expand the event log">
          <span class="live-log-line" id="liveLogLine">…</span>
        </div>
      </div>

      <div class="zoomctl" aria-label="Zoom">
        <button id="zoomIn" data-tip="Zoom in" aria-label="Zoom in"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></button>
        <button id="zoomOut" data-tip="Zoom out" aria-label="Zoom out"><svg viewBox="0 0 24 24"><path d="M5 12h14"/></svg></button>
        <button id="zoomReset" data-tip="Fullscreen map (F) · 0 resets to the world" aria-label="Toggle fullscreen"><svg viewBox="0 0 24 24"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5"/></svg></button>
      </div>

      <div class="tip" id="tip"></div>
      <div class="btntip" id="btntip" role="tooltip"></div>
    </div>

    <!-- loading / server-picker / maintenance splash — a direct child of .app (NOT .stage) so it
         covers the FULL viewport including the top bar, and centres vertically in it -->
    <div id="loading" role="status" aria-label="Loading the world map">
      <img class="ld-art" alt="">
      <div class="ld-bar"></div>
      <!-- server picker: the bootstrap (below) fills #ldServers with one row per server and
           holds here until the user clicks one to connect (each row shows its online version). -->
      <div class="ld-picker" id="ldPicker" hidden>
        <div class="ld-title">CivStudio</div>
        <div class="ld-sub">Choose a server</div>
        <div class="ld-servers" id="ldServers" role="listbox" aria-label="Servers"></div>
        <div class="ld-hint">Press <kbd>Esc</kbd> or click outside to dismiss</div>
      </div>
      <!-- a "Did you know?" tip from the docs, revealed during the post-connect hold (js/main.mjs) -->
      <div class="ld-trivia" aria-live="polite"><span class="ld-trivia-label">Did you know?</span><span class="ld-trivia-body"></span></div>
    </div>

    <aside class="railwrap" id="railwrap">
      <div class="rail-resize" id="railResize" role="separator" aria-orientation="vertical" aria-label="Resize panel" title="Drag to resize"></div>
      <button id="railClose" class="railclose" data-tip="Close panel (Esc)" aria-label="Close panel">&times;</button>
      <div class="rail" id="rail"></div>
    </aside>

    <!-- shortcut hints; populated from js/shortcuts.mjs (the single source for the bar) -->
    <!-- Technology Advisor: the tech tree as a map-mode over #stage (map rendering pauses behind it).
         A child of .app (sibling of #stage/#railwrap) so it inherits the layout vars and covers only
         the stage region — the top bar + advisor sub-bar stay live. Populated by js/techtree.mjs. -->
    <div id="techModal" class="tech-modal" hidden role="region" aria-label="Technology tree">
    <div class="tech-shell" role="document">
      <header class="tech-head">
        <div class="tech-brand">Tech Tree (F6)</div>
        <div id="techEras" class="segToggle tech-eras" role="group" aria-label="Jump to era"></div>
        <div class="searchbar tech-searchbar" role="search">
          <svg class="search-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
          <input type="text" id="techSearch" placeholder="Search techs…" autocomplete="off" spellcheck="false" aria-label="Search technologies">
          <button id="techSearchClear" class="search-clear" aria-label="Clear search" hidden>&times;</button>
          <div class="search-results" id="techSearchResults" role="listbox" hidden></div>
        </div>
        <button class="tech-close" data-tech-close data-tip="Close (Esc)" aria-label="Close technology tree">&times;</button>
      </header>
      <div class="tech-body">
        <div id="techViewport" class="tech-viewport">
          <div id="techSizer" class="tech-sizer">
            <div id="techCanvas" class="tech-canvas">
              <svg id="techEdges" class="tech-edges" aria-hidden="true"></svg>
            </div>
          </div>
        </div>
        <div class="tech-zoomctl zoomctl" aria-label="Zoom">
          <button id="techZoomIn" data-tip="Zoom in" aria-label="Zoom in"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></button>
          <button id="techZoomOut" data-tip="Zoom out" aria-label="Zoom out"><svg viewBox="0 0 24 24"><path d="M5 12h14"/></svg></button>
        </div>
        <aside id="techDetail" class="tech-detail" hidden aria-live="polite"></aside>
      </div>
    </div>
    </div>
  </div>

  <!-- persistent bottom status line: surfaces errors/warnings (and any status message) -->
  <div id="statusline" role="status" aria-live="polite"></div>
  <script>
  (function () {
    var el = document.getElementById("statusline"), timer;
    function show(msg, kind) {
      if (!el || msg == null) return;
      el.textContent = String(msg);
      el.setAttribute("data-kind", kind || "info");
      el.classList.add("on");
      clearTimeout(timer);
      timer = setTimeout(function () { el.classList.remove("on"); }, 9000);
    }
    window.__status = show;
    el.addEventListener("click", function () { el.classList.remove("on"); });
    window.addEventListener("error", function (e) { show((e && e.message) || "Script error", "error"); });
    window.addEventListener("unhandledrejection", function (e) {
      var r = e && e.reason; show("Unhandled: " + ((r && r.message) || r), "error");
    });
    var ce = console.error, cw = console.warn;
    console.error = function () { show(Array.prototype.join.call(arguments, " "), "error"); return ce.apply(console, arguments); };
    console.warn  = function () { show(Array.prototype.join.call(arguments, " "), "warn");  return cw.apply(console, arguments); };
  })();
  </script>

  <!-- per-province trade good (static, seed-independent): sets window.TRADEGOODS before the app module
       evaluates (core.mjs reads it at eval, like window.BUNDLE). A deferred classic script runs before
       the dynamically-imported module app, and a 404 just leaves TRADEGOODS undefined (feature off). -->
  <script defer src="tradegoods.js"></script>
  <!-- window.BUNDLE (the map/geo backbone) now comes from the spectator server — the single
       source of truth, assembled by com.civstudio.server.web.WorldBundle — instead of a committed
       data.js. The loading screen holds up a SERVER PICKER (dev is the default cloud server, local
       targets a server on this machine; ?live=<url> injects a one-off custom entry). Each row shows
       the server's version, fetched online from /actuator/info. We WAIT for the user to click a
       server, then poll readiness (/actuator/health), fetch the bundle, and import the module app —
       core.mjs reads window.BUNDLE synchronously at eval time, so it must be populated first. -->
  <script>
  (function () {
    var params = new URLSearchParams(location.search);
    // dev = the default cloud server; local = a server run on this machine. ?live=<url> prepends a
    // one-off custom entry (ad-hoc testing) and preselects it. Trailing slashes trimmed; the chosen
    // base flows to the app as BUNDLE.live.base (live.mjs's LIVE_BASE fallback mirrors dev).
    var servers = [
      { id: "dev",   label: "dev",   base: "https://dev.civstudio.com" },
      { id: "local", label: "local", base: "http://localhost:8080" }
    ];
    var custom = params.get("live");
    if (custom) servers.unshift({ id: "custom", label: "custom", base: custom });
    servers.forEach(function (s) { s.base = s.base.replace(/\/+$/, ""); });
    var defaultId = custom ? "custom" : "dev";

    var loading = document.getElementById("loading");
    var picker  = document.getElementById("ldPicker");
    var listEl  = document.getElementById("ldServers");
    var art = loading && loading.querySelector(".ld-art");
    var bar = loading && loading.querySelector(".ld-bar");
    // cycle the loading splash through the committed set every 10s while the screen is up (picker +
    // connecting + the post-connect hold), stopping once the app fades it out (.gone)
    var LOADING_ARTS = ["loading-0", "loading-1", "loading-2", "loading-3", "loading-4"]
      .map(function (n) { return "assets/loading/" + n + ".jpg"; });
    var artIdx = Math.floor(Math.random() * LOADING_ARTS.length);
    function showLoadingArt() { if (art) art.src = LOADING_ARTS[artIdx % LOADING_ARTS.length]; }
    showLoadingArt();
    var artTimer = setInterval(function () {
      if (loading.classList.contains("gone")) { clearInterval(artTimer); return; }
      artIdx = (artIdx + 1) % LOADING_ARTS.length; showLoadingArt();
    }, 10000);
    if (bar) bar.hidden = true;                     // no progress bar until a server is picked

    var connecting = false;
    var mode = "boot";        // "boot" = first load: pick → connect + import the app. "switch" =
                              // already connected (title re-opened it): picking reloads into that
                              // server, and the overlay is dismissable (Esc / click-outside) back
                              // to the running map.
    var sub  = loading && loading.querySelector(".ld-sub");

    function currentBase() { return (window.BUNDLE && window.BUNDLE.live && window.BUNDLE.live.base) || null; }

    // one row per server: label · host · online version · status dot. A row is clickable once its
    // probe says "up". In switch mode the currently-connected server is marked; otherwise the
    // default server's row is pre-highlighted.
    function render() {
      listEl.textContent = "";
      var cur = mode === "switch" ? currentBase() : null;
      servers.forEach(function (s) {
        var isCurrent = cur && s.base === cur;
        var row = document.createElement("button");
        row.className = "ld-srv" + (s.id === defaultId ? " is-default" : "") + (isCurrent ? " is-current" : "");
        row.type = "button"; row.setAttribute("role", "option");
        row.setAttribute("aria-selected", (isCurrent || (mode !== "switch" && s.id === defaultId)) ? "true" : "false");
        row.disabled = connecting || s.status !== "up";

        var name = document.createElement("span"); name.className = "srv-name"; name.textContent = s.label;
        var host = document.createElement("span"); host.className = "srv-host";
        host.textContent = s.base.replace(/^https?:\/\//, "");
        var meta = document.createElement("span"); meta.className = "srv-meta";
        var ver  = document.createElement("span"); ver.className = "srv-ver";
        ver.textContent = s.status === "up" ? (verLabel(s) + (isCurrent ? " · connected" : ""))
          : s.status === "down" ? "offline" : "checking…";
        var dot  = document.createElement("span"); dot.className = "srv-dot srv-" + (s.status || "wait");
        meta.appendChild(ver); meta.appendChild(dot);
        if (s.build && s.build.commit) row.title = "commit " + s.build.commit + (s.build.time ? " · built " + s.build.time : "");

        row.appendChild(name); row.appendChild(host); row.appendChild(meta);
        row.addEventListener("click", function () {
          if (connecting || s.status !== "up") return;
          if (mode === "switch") select(s); else connect(s);
        });
        listEl.appendChild(row);
      });
    }
    function showPicker() { picker.hidden = false; }
    var probing = false;
    function startPicker() {                      // reveal the picker + (once) begin probing on an interval
      showPicker(); render();
      if (!probing) { probing = true; setInterval(probeAll, 5000); }
      probeAll();                                 // refresh statuses immediately (also on every re-open)
    }

    // switch to another server while already connected: a fresh page load is required (the app
    // boots once), so navigate with ?server=<id> (carrying ?live for a custom entry). Re-picking
    // the current server just dismisses the overlay.
    function select(s) {
      if (currentBase() === s.base) { closePicker(); return; }
      var q = "?server=" + encodeURIComponent(s.id);
      if (s.id === "custom") q += "&live=" + encodeURIComponent(s.base);
      location.href = location.pathname + q;
    }

    // probe a server's /actuator/info (CORS-allowed) for reachability + build.version. A response
    // means up (build.version fills the row; "unknown" for an older server without build-info); a
    // network error / non-OK means down. Re-probed on an interval so a starting server flips to up.
    function probe(s) {
      return fetch(s.base + "/actuator/info", { credentials: "omit", cache: "no-store" })
        .then(function (r) { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
        .then(function (j) { var b = (j && j.build) || {}; s.status = "up"; s.version = b.version; s.build = b; })
        .catch(function () { s.status = "down"; s.version = null; s.build = null; })
        .then(function () { if (!connecting) render(); });
    }
    // "0.9.0-SNAPSHOT · #345" — the version plus the auto-incrementing build number (git commit
    // count) when the server reports one (omitted for the "0" Docker fallback / a build without it).
    function verLabel(s) {
      var v = s.version || "unknown";
      if (s.build && s.build.number && s.build.number !== "0") v += " · #" + s.build.number;
      return v;
    }
    function probeAll() { if (!connecting) servers.forEach(probe); }

    // connect to the picked server: hold the picker (rows disabled), show the progress bar, confirm
    // readiness (health), fetch the bundle, and boot the module app. On failure, surface it and
    // re-enable the picker so another server can be tried.
    function connect(s) {
      connecting = true; render();
      if (bar) bar.hidden = false;
      if (window.__status) window.__status("Connecting to " + s.label + " (" + s.base + ")…", "info");
      fetch(s.base + "/actuator/health", { credentials: "omit", cache: "no-store" })
        .then(function (r) {
          if (r.status === 404) return;                   // up, no Actuator — fall through to the bundle
          if (!r.ok) throw new Error("HTTP " + r.status);
          return r.json().then(function (h) { if (!h || h.status !== "UP") throw new Error("status " + (h && h.status)); });
        })
        .then(function () { return fetch(s.base + "/api/bundle", { credentials: "omit" }); })
        .then(function (r) { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
        .then(function (b) { b.live = { base: s.base }; window.BUNDLE = b; return import("./app.js"); })
        .catch(function (e) {
          connecting = false; s.status = "down";
          if (bar) bar.hidden = true;
          if (window.__status) window.__status("Could not reach " + s.label + " — " + (e && e.message || e), "error");
          startPicker();                        // auto-connect failed → reveal the picker (and start probing)
        });
    }

    // dismiss the overlay back to the running map — only in switch mode (in boot mode there is no
    // map yet, so a pick is mandatory and Esc/click-outside do nothing).
    function closePicker() {
      if (mode !== "switch" || picker.hidden) return;
      picker.hidden = true;
      loading.classList.remove("switch");
      loading.classList.add("gone");
    }

    // the running app re-opens the picker over the live map: js/panel.mjs on the title click (a
    // voluntary "switch server"), or on a lost live connection (live.mjs calls .lost() when the SSE
    // stream drops). A failed plots.pack slice does NOT — it degrades to the blurred raster. Both
    // route through window because this boot IIFE owns the server list + probes and the module app
    // can't reach into its closure otherwise.
    function isOpenSwitch() { return mode === "switch" && !picker.hidden; }
    function openPicker(opts) {
      mode = "switch"; connecting = false;
      var reason = opts && opts.reason;
      if (sub) sub.textContent = reason ? "Connection lost — reconnect" : "Switch server";
      if (reason && window.__status) window.__status(reason, "error");
      if (bar) bar.hidden = true;
      loading.classList.remove("gone");
      loading.classList.add("switch");          // transparent modal over the map (styles.css)
      loading.hidden = false;
      startPicker();
    }
    // drop to the picker because the live connection/data was lost. Opens once; if already open it
    // just refreshes the reason, so a storm of failures (every province's plots.pack) doesn't thrash.
    function lostPicker(reason) {
      if (isOpenSwitch()) { if (reason && window.__status) window.__status(reason, "error"); return; }
      openPicker({ reason: reason || "Connection to the server was lost" });
    }
    window.__picker = { open: openPicker, lost: lostPicker, close: closePicker, isOpen: isOpenSwitch };
    // Esc, or a click on the dimmed backdrop (outside the panel), dismisses the switch overlay.
    document.addEventListener("keydown", function (e) {
      if (e.key === "Escape" && mode === "switch" && !picker.hidden) { e.preventDefault(); closePicker(); }
    });
    loading.addEventListener("click", function (e) {
      if (mode === "switch" && !picker.hidden && !picker.contains(e.target)) closePicker();
    });

    // ?server=<id> (dev|local|custom) bypasses the picker and connects straight to that server; on
    // failure connect() reveals the picker. A bare ?live=<url> also auto-connects (to its custom
    // entry) — preserving the old point-at-a-server testing shortcut. Otherwise: show the picker
    // and wait for a click.
    var auto = params.get("server") || (custom ? "custom" : null);
    var target = auto && servers.filter(function (s) { return s.id === auto; })[0];
    if (target) {
      connect(target);
    } else {
      startPicker();
    }
  })();
  </script>

  <!-- Update detector: Azure Static Web Apps stamps every asset with one deployment-wide ETag, so a
       changed ETag means a new web build shipped. We capture it at boot and re-check on tab-focus
       (throttled) plus a slow backstop timer — NOT a tight poll. On a change we offer a reload (a
       reload drops the current map view, so we let the user choose) — unless they're still on the
       loading/picker screen, where reloading is seamless so we just do it. -->
  <script>
  (function () {
    var FOCUS_GAP = 180000;    // re-check on focus at most once per 3 min
    var BACKSTOP  = 900000;    // and once per 15 min for a tab left focused
    var bootTag = null, bootServerVer = null, lastCheck = 0, notified = false;

    function readTag() {
      // no-store bypasses the 30 s asset cache so we read the CURRENT deployment's ETag
      return fetch(location.pathname, { method: "HEAD", cache: "no-store" })
        .then(function (r) { return r.ok ? (r.headers.get("etag") || r.headers.get("last-modified")) : null; })
        .catch(function () { return null; });
    }
    // the connected server's build id (version|number|commit) from /actuator/info — so a redeploy of
    // the SERVER the user is watching is detected too, not just a new web build. null when not yet
    // connected (still on the picker) or unreachable; the same source the app connects through.
    function serverBase() {
      var q = new URLSearchParams(location.search).get("live");
      if (q) return q.replace(/\/+$/, "");
      var b = window.BUNDLE && window.BUNDLE.live && window.BUNDLE.live.base;
      return b ? b.replace(/\/+$/, "") : null;
    }
    function readServerVer() {
      var base = serverBase();
      if (!base) return Promise.resolve(null);
      return fetch(base + "/actuator/info", { credentials: "omit", cache: "no-store" })
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (j) { var b = (j && j.build) || {}; return b.version ? [b.version, b.number, b.commit].join("|") : null; })
        .catch(function () { return null; });
    }
    function check() {
      if (notified) return;
      var now = Date.now();
      if (now - lastCheck < FOCUS_GAP) return;
      lastCheck = now;
      Promise.all([readTag(), readServerVer()]).then(function (r) {
        var tag = r[0], sver = r[1];
        if (bootTag == null && tag) bootTag = tag;                 // seed baselines on first read
        if (bootServerVer == null && sver) bootServerVer = sver;
        var frontendNew = tag && bootTag && tag !== bootTag;
        var serverNew = sver && bootServerVer && sver !== bootServerVer;
        // A SERVER-only redeploy (new CivStudio version, same web build) needs no reload: the live
        // feed reconnects itself through the revision hand-off (js/overlays/live.mjs), and the map/
        // bundle stay valid. Just refresh the baseline so we don't keep flagging it — don't yank the
        // user back to the loading screen. Only a new WEB build (changed ETag) needs a reload to pick
        // up the new client code.
        if (serverNew && !frontendNew) { bootServerVer = sver; return; }
        if (!frontendNew) return;
        notified = true;
        // still on the loading/picker screen (not connected) → reloading is seamless, just do it
        var l = document.getElementById("loading");
        if (l && !l.classList.contains("gone")) { location.reload(); return; }
        showUpdateToast();
      });
    }
    function showUpdateToast() {
      if (document.querySelector(".update-toast")) return;
      var t = document.createElement("div");
      t.className = "update-toast";
      t.innerHTML = '<span class="ut-msg">A new version of CivStudio is available.</span>' +
        '<button class="ut-reload" type="button">Reload</button>' +
        '<button class="ut-x" type="button" aria-label="Dismiss">×</button>';
      document.body.appendChild(t);
      t.querySelector(".ut-reload").addEventListener("click", function () { location.reload(); });
      t.querySelector(".ut-x").addEventListener("click", function () { t.remove(); });
      requestAnimationFrame(function () { t.classList.add("on"); });
    }

    Promise.all([readTag(), readServerVer()]).then(function (r) { if (r[0]) bootTag = r[0]; if (r[1]) bootServerVer = r[1]; }); // seed baselines at boot
    document.addEventListener("visibilitychange", function () { if (!document.hidden) check(); });
    setInterval(check, BACKSTOP);
    // expose for verification (headless test drives this without waiting on focus/timer)
    window.__updateCheck = check;
  })();
  </script>
  <script>
  // Cookie disclaimer: CivStudio sets only essential cookies (the login session + the "remember me"
  // token) — no tracking, no ads. Show a one-time notice; the dismissal is stored locally so it does
  // not nag on return visits. Self-contained and dependency-free, like the update toast above.
  (function () {
    try { if (localStorage.getItem("cookieConsent")) return; } catch (e) { return; }
    function show() {
      if (document.querySelector(".cookie-banner")) return;
      var b = document.createElement("div");
      b.className = "cookie-banner";
      b.setAttribute("role", "note");
      b.innerHTML = '<span class="cb-msg"><b>This site uses cookies</b> — only the essentials, to ' +
        'keep you signed in across sessions. No tracking, no ads.</span>' +
        '<button class="cb-ok" type="button">Got it</button>';
      document.body.appendChild(b);
      b.querySelector(".cb-ok").addEventListener("click", function () {
        try { localStorage.setItem("cookieConsent", "1"); } catch (e) {}
        b.classList.remove("on");
        setTimeout(function () { b.remove(); }, 320);
      });
      requestAnimationFrame(function () { b.classList.add("on"); });
    }
    if (document.body) show(); else document.addEventListener("DOMContentLoaded", show);
  })();
  </script>
</body>
