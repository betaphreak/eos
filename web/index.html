<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CivStudio Caravan View</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <div class="stage" id="stage">
      <canvas id="map"></canvas>

      <div class="titleblock">
        <p class="eyebrow">CivStudio · seed 24601 · replay</p>
        <h1 class="title serif">Migration from Dhenijansar</h1>
        <p class="subtitle">Six caravans muster on the Rahen coast and strike out across the known world, foraging and hauling cargo until each reaches its distant site. A recorded run of the engine's parallel directed marches.</p>
      </div>

      <button class="themebtn" id="themeBtn" title="Toggle light / dark" aria-label="Toggle theme">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M19.1 4.9l-1.4 1.4M6.3 17.7l-1.4 1.4"/></svg>
      </button>
      <button class="themebtn" id="heatBtn" style="right:64px" title="Toggle caravan-days heat" aria-label="Toggle traffic heat">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M12 3s5 4 5 8.5A5 5 0 0 1 7 11.5c0-1.6 1-2.9 1-2.9s.4 1.8 1.8 1.8C10.8 7.8 12.5 6 12 3z"/></svg>
      </button>

      <div class="legend" id="legend" aria-label="Caravan journeys"></div>

      <div class="zoomctl" aria-label="Zoom">
        <button id="zoomIn" title="Zoom in" aria-label="Zoom in"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></button>
        <button id="zoomOut" title="Zoom out" aria-label="Zoom out"><svg viewBox="0 0 24 24"><path d="M5 12h14"/></svg></button>
        <button id="zoomReset" title="Reset view" aria-label="Reset view"><svg viewBox="0 0 24 24"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5"/></svg></button>
      </div>

      <div class="transport">
        <button class="playbtn" id="playBtn" aria-label="Play"><svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>
        <div class="tl-wrap">
          <div class="tl-dates"><span id="dLo"></span><span class="datepill mono" id="dNow"></span><span id="dHi"></span></div>
          <input type="range" class="scrub" id="scrub" min="0" max="1000" value="0" aria-label="Timeline">
        </div>
        <div class="speed" id="speed" role="group" aria-label="Playback speed"></div>
      </div>

      <div class="tip" id="tip"></div>
    </div>

    <aside class="rail" id="rail"></aside>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
